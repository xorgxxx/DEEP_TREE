<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>الشجرة التفاعلية - معلومات مخبّأة وثعالب</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Cairo', 'Tahoma', sans-serif;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 16px;
            color: white;
            direction: rtl;
            z-index: 20;
            pointer-events: none;
            border-right: 4px solid #f4a261;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(20,20,30,0.85);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            z-index: 30;
            pointer-events: auto;
            border: 1px solid rgba(255,215,150,0.4);
            font-family: inherit;
        }
        button {
            background: #2c6e3c;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            font-size: 14px;
        }
        button:hover {
            background: #3e8e50;
            transform: scale(1.02);
        }
        .status-badge {
            background: #1e2a23;
            padding: 6px 15px;
            border-radius: 40px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        #messageBox {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2c2418e6;
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px 28px;
            color: #ffecb3;
            max-width: 280px;
            text-align: center;
            z-index: 100;
            border: 1px solid #ffb347;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            font-size: 18px;
            font-weight: bold;
            direction: rtl;
            display: none;
            font-family: inherit;
        }
        #messageBox button {
            background: #b96f20;
            margin-top: 15px;
            padding: 6px 18px;
        }
        .leaf-hint {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: #00000099;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            color: #dddddd;
        }
        @media (max-width: 650px) {
            button { padding: 6px 12px; font-size: 12px; }
            .status-badge { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div id="info-panel">
        🌳 الشجرة السحرية | اضغط على أي ورقة لرؤية/تعديل معلوماتها المخبّأة 💾
    </div>
    <div id="controls">
        <button id="addLeafBtn">🍃 إضافة ورقة جديدة</button>
        <button id="resetCamBtn">🔄 إعادة ضبط الكاميرا</button>
        <button id="windToggleBtn">💨 وقف/تشغيل الرياح</button>
        <div class="status-badge" id="windStatus">🌬️ الرياح: نشطة</div>
        <div class="status-badge">🦊 ثعلبان يحرسان الشجرة</div>
    </div>
    <div id="messageBox">
        <div id="msgText"></div>
        <button id="closeMsgBtn">✖️ إغلاق</button>
    </div>
    <div class="leaf-hint">🔍 تلميح: اضغط على الورقة لفتح معلوماتها</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- إعداد المشهد (أكبر قليلاً) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x071a2b);
        scene.fog = new THREE.FogExp2(0x071a2b, 0.006);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6.5, 5.2, 8);
        camera.lookAt(0, 2.8, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- تحكم الكاميرا ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.3;
        controls.target.set(0, 2.8, 0);

        // --- إضاءة محسنة ---
        const ambient = new THREE.AmbientLight(0x4a5b6e);
        scene.add(ambient);
        const sunLight = new THREE.DirectionalLight(0xffeebb, 1.3);
        sunLight.position.set(6, 12, 4);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 18;
        sunLight.shadow.camera.left = -6;
        sunLight.shadow.camera.right = 6;
        sunLight.shadow.camera.top = 6;
        sunLight.shadow.camera.bottom = -6;
        scene.add(sunLight);
        
        const fillLight = new THREE.PointLight(0xa5c9ff, 0.45);
        fillLight.position.set(1, 3, 2);
        scene.add(fillLight);
        const backWarm = new THREE.PointLight(0xd9a066, 0.55);
        backWarm.position.set(-3, 2.5, -4);
        scene.add(backWarm);

        // نجوم
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1200;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 300;
            starPos[i*3+1] = (Math.random() - 0.5) * 100;
            starPos[i*3+2] = (Math.random() - 0.5) * 100 - 50;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xfafad2, size: 0.09, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // أرضية أكبر
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(18, 18),
            new THREE.MeshStandardMaterial({ color: 0x418c34, roughness: 0.85, metalness: 0.05 })
        );
        ground.rotation.x = -Math.PI/2;
        ground.position.y = -0.25;
        ground.receiveShadow = true;
        scene.add(ground);

        // أعشاب
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x6bb55a });
        for (let i = 0; i < 500; i++) {
            const blade = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.07, 0.1 + Math.random()*0.2, 3), grassMat);
            const angle = Math.random() * Math.PI * 2;
            const rad = 2.3 + Math.random() * 6.2;
            const x = Math.cos(angle) * rad;
            const z = Math.sin(angle) * rad;
            blade.position.set(x, -0.22, z);
            blade.castShadow = true;
            scene.add(blade);
        }

        // --- الشجرة (أكبر حجماً) ---
        const treeGroup = new THREE.Group();
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.6 });
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.75, 1.0, 2.2, 10), trunkMat);
        trunk.position.y = 0.9;
        trunk.castShadow = true;
        treeGroup.add(trunk);

        // فروع أكثر سمكاً
        const branchMat = new THREE.MeshStandardMaterial({ color: 0xa57542 });
        const branchParams = [
            { pos: [0.75, 1.5, 0.4], rot: [0.1, 0.5, 0.5], scale: [0.45, 1.1, 0.45] },
            { pos: [-0.7, 1.6, -0.5], rot: [0, -0.4, 0.4], scale: [0.48, 1.0, 0.48] },
            { pos: [0.4, 2.0, 0.9], rot: [0.2, 0.7, 0.3], scale: [0.4, 0.9, 0.4] },
            { pos: [-0.5, 2.1, -0.8], rot: [-0.1, -0.8, 0.4], scale: [0.42, 0.95, 0.42] },
            { pos: [0.8, 2.4, -0.3], rot: [0.1, 0.9, 0.2], scale: [0.38, 0.85, 0.38] }
        ];
        const branchMeshes = [];
        branchParams.forEach(b => {
            const branch = new THREE.Mesh(new THREE.CylinderGeometry(b.scale[0], b.scale[2], b.scale[1], 6), branchMat);
            branch.position.set(b.pos[0], b.pos[1], b.pos[2]);
            branch.rotation.set(b.rot[0], b.rot[1], b.rot[2]);
            branch.castShadow = true;
            treeGroup.add(branch);
            branchMeshes.push(branch);
        });

        // --- الأوراق (قابلة للنقر مع معلومات مخبأة) ---
        const leafMatGreen = new THREE.MeshStandardMaterial({ color: 0x5cad3a, roughness: 0.35, emissive: 0x226622, emissiveIntensity: 0.1 });
        const leafMatLight = new THREE.MeshStandardMaterial({ color: 0x86d46a });

        // قائمة بجميع كرات الأوراق
        const leafSpheres = [];    // كائنات THREE.Mesh
        const leafInfoMap = new Map(); // key = uuid (or sphere.id) , value = { text: "..." }
        
        // وظيفة مساعدة لحفظ البيانات في localStorage
        function saveLeavesToLocal() {
            const store = [];
            leafSpheres.forEach(sp => {
                const info = leafInfoMap.get(sp.uuid) || { text: "ورقة جديدة بدون معلومات 😊" };
                store.push({
                    id: sp.uuid,
                    text: info.text,
                    posX: sp.position.x,
                    posY: sp.position.y,
                    posZ: sp.position.z
                });
            });
            localStorage.setItem('treeLeavesData', JSON.stringify(store));
        }

        // استعادة البيانات من localStorage
        function loadLeavesFromLocal() {
            const raw = localStorage.getItem('treeLeavesData');
            if (!raw) return false;
            try {
                const data = JSON.parse(raw);
                data.forEach(item => {
                    // نبحث عن الكرة المطابقة لها id (uuid)
                    const sphere = leafSpheres.find(s => s.uuid === item.id);
                    if (sphere) {
                        let infoText = item.text;
                        if (!infoText || infoText === "") infoText = "✨ سر الطبيعة ✨";
                        leafInfoMap.set(sphere.uuid, { text: infoText });
                        if (sphere.userData) sphere.userData.infoText = infoText;
                    }
                });
                return true;
            } catch(e) { return false; }
        }

        // إنشاء ورقة جديدة مع إمكانية تحديد معلومات
        function createLeafAt(x, y, z, customInfo = null) {
            const size = 0.48 + Math.random() * 0.18;
            const material = Math.random() > 0.5 ? leafMatGreen : leafMatLight;
            const leaf = new THREE.Mesh(new THREE.SphereGeometry(size, 14, 14), material);
            leaf.position.set(x, y, z);
            leaf.castShadow = true;
            leaf.userData = { isLeaf: true, infoText: customInfo || "📜 اضغط لكتابة ملاحظة" };
            treeGroup.add(leaf);
            leafSpheres.push(leaf);
            leafInfoMap.set(leaf.uuid, { text: leaf.userData.infoText });
            return leaf;
        }

        // إضافة الأوراق الأساسية (بأحجام أكبر)
        const baseLeafPositions = [
            [0, 2.4, 0], [0.65, 2.6, 0.4], [-0.6, 2.7, -0.5], [0.4, 2.9, 0.7], [-0.4, 3.0, -0.3],
            [0.85, 2.3, -0.3], [-0.85, 2.4, 0.2], [0.2, 3.3, 0.3], [-0.2, 3.4, 0.4], [0.6, 3.0, -0.6],
            [0, 3.6, 0], [0.5, 2.0, 1.0], [-0.5, 2.1, -1.0], [0.9, 1.9, 0.7], [-0.9, 2.1, -0.7],
            [1.0, 2.7, 0.1], [-1.0, 2.8, -0.1], [0.3, 3.8, 0.2], [-0.3, 3.9, -0.2]
        ];
        baseLeafPositions.forEach(pos => {
            createLeafAt(pos[0], pos[1], pos[2], "🍃 حكمة الشجرة: 'ازرع جميلاً يثمر خيراً'");
        });

        // إضافة أوراق إضافية صغيرة
        for (let i = 0; i < 45; i++) {
            const ang = Math.random() * Math.PI * 2;
            const rad = 0.9 + Math.random() * 1.7;
            const yoff = 2.0 + Math.random() * 2.1;
            const xOff = Math.cos(ang) * rad;
            const zOff = Math.sin(ang) * rad;
            createLeafAt(xOff, yoff, zOff, "🌟 سر صغير ينتظر من يكتشفه");
        }

        // تحميل البيانات المخزنة بعد إنشاء الأوراق
        loadLeavesFromLocal();
        // تحديث userData بناءً على leafInfoMap
        leafSpheres.forEach(sp => {
            const stored = leafInfoMap.get(sp.uuid);
            if (stored) sp.userData.infoText = stored.text;
            else sp.userData.infoText = "📖 اضغط لتحرير المذكرة";
        });
        
        // --- نافذة المعلومات المنبثقة ---
        const msgBox = document.getElementById('messageBox');
        const msgTextDiv = document.getElementById('msgText');
        const closeMsg = document.getElementById('closeMsgBtn');
        let currentLeaf = null;

        function showMessageForLeaf(leaf) {
            const info = leaf.userData.infoText || "لا توجد معلومات بعد";
            msgTextDiv.innerText = `📜 المعلومة المخبأة:\n\n${info}\n\n✏️ يمكنك تعديلها الآن`;
            msgBox.style.display = 'block';
            currentLeaf = leaf;
        }
        function hideMessage() { msgBox.style.display = 'none'; currentLeaf = null; }
        closeMsg.addEventListener('click', () => {
            if (currentLeaf) {
                const newText = prompt("✏️ حرّر المعلومة المخبأة لهذه الورقة:", currentLeaf.userData.infoText);
                if (newText !== null && newText.trim() !== "") {
                    currentLeaf.userData.infoText = newText.trim();
                    leafInfoMap.set(currentLeaf.uuid, { text: newText.trim() });
                    saveLeavesToLocal();
                    alert("✅ تم حفظ المعلومة بنجاح في ذاكرة الجهاز!");
                }
            }
            hideMessage();
        });

        // --- راي كاستر للتفاعل مع النقر على الورقة ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(leafSpheres);
            if (intersects.length > 0) {
                const clickedLeaf = intersects[0].object;
                showMessageForLeaf(clickedLeaf);
            }
        });

        // --- زر إضافة ورقة جديدة (مع إدخال معلومات)---
        document.getElementById('addLeafBtn').addEventListener('click', () => {
            const defaultInfo = prompt("أدخل المعلومة السرية لهذه الورقة الجديدة:", "🍀 حكمة جديدة: كن كالشجرة، قوياً وجميلاً");
            let finalInfo = defaultInfo && defaultInfo.trim() !== "" ? defaultInfo : "💚 ورقة جديدة بدون أسرار";
            // اختيار مكان عشوائي حول الشجرة
            const angle = Math.random() * Math.PI * 2;
            const radius = 1.1 + Math.random() * 1.6;
            const yPos = 1.9 + Math.random() * 2.3;
            const xNew = Math.cos(angle) * radius;
            const zNew = Math.sin(angle) * radius;
            const newLeaf = createLeafAt(xNew, yPos, zNew, finalInfo);
            // تحديث الخريطة والحفظ
            leafInfoMap.set(newLeaf.uuid, { text: finalInfo });
            saveLeavesToLocal();
            alert("🍃 تم إضافة ورقة جديدة مع معلوماتها!");
        });

        // --- الثعالب (ثعلب أحمر وثعلبة) ---
        function createFox(color, posX, posZ, isMale = true) {
            const group = new THREE.Group();
            // الجسم
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.45, 0.9), bodyMat);
            body.position.y = 0.2;
            body.castShadow = true;
            group.add(body);
            // الرأس
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.38, 20, 20), bodyMat);
            head.position.set(0, 0.45, 0.55);
            head.castShadow = true;
            group.add(head);
            // الأذنان
            const earMat = new THREE.MeshStandardMaterial({ color: color, emissive: 0x442200 });
            const earL = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.35, 8), earMat);
            earL.position.set(-0.23, 0.78, 0.55);
            const earR = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.35, 8), earMat);
            earR.position.set(0.23, 0.78, 0.55);
            group.add(earL, earR);
            // الأنف
            const nose = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshStandardMaterial({ color: 0x553322 }));
            nose.position.set(0, 0.4, 0.88);
            group.add(nose);
            // الذيل (طويل)
            const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.07, 0.65, 6), bodyMat);
            tail.position.set(0, 0.1, -0.65);
            tail.rotation.x = 0.5;
            tail.rotation.z = 0.2;
            group.add(tail);
            // أرجل بسيطة
            const legMat = new THREE.MeshStandardMaterial({ color: color });
            const legPos = [[-0.25, -0.05, 0.4], [0.25, -0.05, 0.4], [-0.25, -0.05, -0.3], [0.25, -0.05, -0.3]];
            legPos.forEach(pos => {
                const leg = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.28, 0.18), legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                group.add(leg);
            });
            group.position.set(posX, -0.18, posZ);
            group.scale.set(0.9, 0.9, 0.9);
            scene.add(group);
            return group;
        }
        
        const foxRed = createFox(0xd94f1a, 2.2, 1.9, true);    // ثعلب أحمر جميل
        const foxFemale = createFox(0xc4805a, -1.8, 2.3, false); // ثعلبة بلون كهرماني
        
        // حركة بسيطة للثعالب (تمشي في دوائر صغيرة)
        let foxTime = 0;
        
        // --- إعداد الرياح (تحريك الأوراق والفروع) ---
        let windEnabled = true;
        const windBtn = document.getElementById('windToggleBtn');
        const windStatusSpan = document.getElementById('windStatus');
        windBtn.addEventListener('click', () => {
            windEnabled = !windEnabled;
            windStatusSpan.innerHTML = windEnabled ? '🌬️ الرياح: نشطة' : '🍃 الرياح: ساكنة';
            windStatusSpan.style.backgroundColor = windEnabled ? '#1e5a2e' : '#3a3a3a';
        });
        
        // نسخ المواضع الأصلية للأوراق والفرع
        const originalLeafPos = leafSpheres.map(l => l.position.clone());
        const originalBranchPos = branchMeshes.map(b => b.position.clone());
        const originalTrunkPos = trunk.position.clone();
        
        // تعيين المنظر
        document.getElementById('resetCamBtn').addEventListener('click', () => {
            camera.position.set(6.5, 5.2, 8);
            controls.target.set(0, 2.8, 0);
            controls.update();
        });
        
        // بطاقة معلقة
        const tagDiv = document.createElement('div');
        tagDiv.textContent = '🌿 شجرة الأسرار 🌿';
        tagDiv.style.backgroundColor = '#1f2a1bdd';
        tagDiv.style.color = '#f9e0a0';
        tagDiv.style.padding = '5px 15px';
        tagDiv.style.borderRadius = '40px';
        tagDiv.style.fontSize = '18px';
        tagDiv.style.fontWeight = 'bold';
        tagDiv.style.border = '1px solid #c2a15b';
        const labelObj = new CSS2DObject(tagDiv);
        labelObj.position.set(0, 4.2, 0);
        scene.add(labelObj);
        
        // --- animation loop ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            if (windEnabled) {
                const intensity = 0.058;
                const speed = 1.7;
                leafSpheres.forEach((leaf, idx) => {
                    if (originalLeafPos[idx]) {
                        leaf.position.x = originalLeafPos[idx].x + Math.sin(time * speed + idx) * intensity * 0.6;
                        leaf.position.z = originalLeafPos[idx].z + Math.cos(time * speed*0.9 + idx) * intensity * 0.55;
                    }
                });
                branchMeshes.forEach((branch, idx) => {
                    if (originalBranchPos[idx]) {
                        branch.position.x = originalBranchPos[idx].x + Math.sin(time * 2.1 + idx) * 0.01;
                        branch.position.z = originalBranchPos[idx].z + Math.cos(time * 1.9 + idx) * 0.01;
                    }
                });
                trunk.position.x = originalTrunkPos.x + Math.sin(time * 1.3) * 0.006;
                trunk.position.z = originalTrunkPos.z + Math.cos(time * 1.4) * 0.006;
            } else {
                leafSpheres.forEach((leaf, idx) => {
                    if (originalLeafPos[idx]) leaf.position.lerp(originalLeafPos[idx], 0.1);
                });
                branchMeshes.forEach((branch, idx) => {
                    if (originalBranchPos[idx]) branch.position.lerp(originalBranchPos[idx], 0.1);
                });
                trunk.position.lerp(originalTrunkPos, 0.1);
            }
            
            // حركة الثعالب ببطء (تجول)
            foxTime += 0.008;
            foxRed.position.x = 2.2 + Math.sin(foxTime) * 0.4;
            foxRed.position.z = 1.9 + Math.cos(foxTime * 0.7) * 0.3;
            foxFemale.position.x = -1.8 + Math.sin(foxTime * 1.1) * 0.45;
            foxFemale.position.z = 2.3 + Math.cos(foxTime * 0.9) * 0.4;
            // جعل الثعالب تنظر باتجاه بعضها أحياناً (تأثير لطيف)
            foxRed.lookAt(foxFemale.position);
            foxFemale.lookAt(foxRed.position);
            
            stars.rotation.y += 0.0003;
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log("شجرة تفاعلية - معلومات مخبأة في الأوراق، ثعالب، وتخزين محلي");
    </script>
</body>
</html>
