<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>غابة الثعالب المرحة - شجرتان وثعالب تلعب معاً</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        /* لا توجد أي عناصر واجهة - مشهد تفاعلي كامل */
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "gsap": "https://unpkg.com/gsap@3.12.5/index.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import gsap from 'gsap';

        // --- إعداد المشهد ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a2f1f);
        scene.fog = new THREE.FogExp2(0x0a2f1f, 0.007);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 4.5, 8);
        camera.lookAt(0, 1.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.2;
        controls.target.set(0, 1.5, 0);

        // --- إضاءة دافئة وجميلة ---
        const ambientLight = new THREE.AmbientLight(0x4a6b3e);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xfff5c0, 1.2);
        sunLight.position.set(5, 10, 4);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 20;
        sunLight.shadow.camera.left = -7;
        sunLight.shadow.camera.right = 7;
        sunLight.shadow.camera.top = 7;
        sunLight.shadow.camera.bottom = -7;
        scene.add(sunLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.5);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0xff9966, 0.4);
        rimLight.position.set(-2, 2.5, -3);
        scene.add(rimLight);

        // أرضية العشب
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(24, 24),
            new THREE.MeshStandardMaterial({ color: 0x5c9e4a, roughness: 0.85, metalness: 0.05 })
        );
        ground.rotation.x = -Math.PI/2;
        ground.position.y = -0.25;
        ground.receiveShadow = true;
        scene.add(ground);

        // حشائش صغيرة
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x7cb55a });
        for (let i = 0; i < 1200; i++) {
            const blade = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.07, 0.1 + Math.random()*0.2, 3), grassMat);
            const angle = Math.random() * Math.PI * 2;
            const rad = 2 + Math.random() * 9;
            const x = Math.cos(angle) * rad;
            const z = Math.sin(angle) * rad;
            blade.position.set(x, -0.22, z);
            blade.castShadow = true;
            scene.add(blade);
        }

        // --- دالة لإنشاء شجرة مع جذع وأوراق ---
        function createTree(x, z, scale = 1) {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.6 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.7 * scale, 0.95 * scale, 2.1 * scale, 8), trunkMat);
            trunk.position.y = 0.9 * scale;
            trunk.castShadow = true;
            group.add(trunk);
            
            const branchMat = new THREE.MeshStandardMaterial({ color: 0xa57542 });
            const branches = [
                { pos: [0.7, 1.5, 0.4], rot: [0.1, 0.5, 0.5], scale: [0.4, 1.0, 0.4] },
                { pos: [-0.65, 1.6, -0.5], rot: [0, -0.4, 0.4], scale: [0.43, 0.95, 0.43] },
                { pos: [0.4, 2.0, 0.85], rot: [0.2, 0.7, 0.3], scale: [0.38, 0.85, 0.38] },
                { pos: [-0.5, 2.1, -0.75], rot: [-0.1, -0.7, 0.4], scale: [0.4, 0.9, 0.4] },
                { pos: [0.75, 2.4, -0.3], rot: [0.1, 0.9, 0.2], scale: [0.35, 0.8, 0.35] }
            ];
            branches.forEach(b => {
                const branch = new THREE.Mesh(new THREE.CylinderGeometry(b.scale[0]*scale, b.scale[2]*scale, b.scale[1]*scale, 5), branchMat);
                branch.position.set(b.pos[0]*scale, b.pos[1]*scale, b.pos[2]*scale);
                branch.rotation.set(b.rot[0], b.rot[1], b.rot[2]);
                branch.castShadow = true;
                group.add(branch);
            });
            
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x5cad3a, roughness: 0.4, emissive: 0x226622, emissiveIntensity: 0.07 });
            const leafPositions = [
                [0, 2.3, 0], [0.6, 2.5, 0.4], [-0.55, 2.6, -0.45], [0.35, 2.8, 0.65], [-0.35, 2.9, -0.3],
                [0.8, 2.2, -0.25], [-0.75, 2.3, 0.2], [0.2, 3.2, 0.3], [-0.2, 3.3, 0.35], [0.55, 2.9, -0.55],
                [0, 3.5, 0], [0.45, 2.0, 0.95], [-0.45, 2.1, -0.95]
            ];
            leafPositions.forEach(pos => {
                const size = (0.45 + Math.random()*0.2) * scale;
                const leaf = new THREE.Mesh(new THREE.SphereGeometry(size, 12, 12), leafMat);
                leaf.position.set(pos[0]*scale, pos[1]*scale, pos[2]*scale);
                leaf.castShadow = true;
                group.add(leaf);
            });
            
            for (let i = 0; i < 40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const rad = 0.8 + Math.random() * 1.6;
                const yoff = 1.8 + Math.random() * 2.0;
                const tiny = new THREE.Mesh(new THREE.SphereGeometry(0.18*scale, 6, 6), leafMat);
                tiny.position.set(Math.cos(angle)*rad*scale, yoff*scale, Math.sin(angle)*rad*scale);
                tiny.castShadow = true;
                group.add(tiny);
            }
            group.position.set(x, 0, z);
            return group;
        }
        
        const tree1 = createTree(-2.8, -2.0, 1.0);
        const tree2 = createTree(3.0, 1.8, 1.1);
        scene.add(tree1);
        scene.add(tree2);
        
        // --- ثعلب متكامل بملامح واضحة جدا وحركة ذيل ممكنة ---
        class AdvancedFox {
            constructor(colorMain, colorAccent, startX, startZ, name) {
                this.group = new THREE.Group();
                this.name = name;
                this.tailAngle = 0;
                this.earsAngle = 0;
                
                // الجسم
                const bodyMat = new THREE.MeshStandardMaterial({ color: colorMain, roughness: 0.3 });
                const body = new THREE.Mesh(new THREE.SphereGeometry(0.52, 24, 24), bodyMat);
                body.scale.set(1.2, 0.8, 1.65);
                body.position.y = 0.2;
                body.castShadow = true;
                this.group.add(body);
                
                // الصدر
                const chestMat = new THREE.MeshStandardMaterial({ color: colorAccent });
                const chest = new THREE.Mesh(new THREE.SphereGeometry(0.42, 20, 20), chestMat);
                chest.scale.set(0.9, 0.7, 0.85);
                chest.position.set(0, 0.2, 0.68);
                chest.castShadow = true;
                this.group.add(chest);
                
                // الرأس
                const headMat = new THREE.MeshStandardMaterial({ color: colorMain });
                this.head = new THREE.Mesh(new THREE.SphereGeometry(0.48, 32, 32), headMat);
                this.head.position.set(0, 0.58, 0.88);
                this.head.castShadow = true;
                this.group.add(this.head);
                
                // الأنف (كبير ولطيف)
                const noseMat = new THREE.MeshStandardMaterial({ color: 0x222222, emissive: 0x331100 });
                this.nose = new THREE.Mesh(new THREE.SphereGeometry(0.13, 24, 24), noseMat);
                this.nose.position.set(0, 0.5, 1.16);
                this.group.add(this.nose);
                
                // العيون (كبيرة وجذابة)
                const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                const eyePupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
                this.leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 32, 32), eyeWhiteMat);
                this.leftEye.position.set(-0.2, 0.72, 1.06);
                this.rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 32, 32), eyeWhiteMat);
                this.rightEye.position.set(0.2, 0.72, 1.06);
                this.leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 24, 24), eyePupilMat);
                this.leftPupil.position.set(-0.2, 0.7, 1.14);
                this.rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 24, 24), eyePupilMat);
                this.rightPupil.position.set(0.2, 0.7, 1.14);
                this.group.add(this.leftEye, this.rightEye, this.leftPupil, this.rightPupil);
                
                // الأذنان (طويلتان ومتحركتان)
                const earMat = new THREE.MeshStandardMaterial({ color: colorMain });
                const earInnerMat = new THREE.MeshStandardMaterial({ color: 0xffaa88 });
                this.leftEar = new THREE.Mesh(new THREE.ConeGeometry(0.24, 0.5, 12), earMat);
                this.leftEar.position.set(-0.3, 0.98, 0.84);
                this.leftEar.rotation.z = -0.25;
                this.rightEar = new THREE.Mesh(new THREE.ConeGeometry(0.24, 0.5, 12), earMat);
                this.rightEar.position.set(0.3, 0.98, 0.84);
                this.rightEar.rotation.z = 0.25;
                const leftInner = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.36, 10), earInnerMat);
                leftInner.position.set(-0.3, 1.0, 0.88);
                const rightInner = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.36, 10), earInnerMat);
                rightInner.position.set(0.3, 1.0, 0.88);
                this.group.add(this.leftEar, this.rightEar, leftInner, rightInner);
                
                // الذيل (طويل وكثيف)
                const tailMat = new THREE.MeshStandardMaterial({ color: colorMain });
                this.tail = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.12, 0.9, 8), tailMat);
                this.tail.position.set(0, 0.1, -1.0);
                this.tail.rotation.x = 0.6;
                this.tail.rotation.z = 0.4;
                this.tail.castShadow = true;
                const tailTip = new THREE.Mesh(new THREE.SphereGeometry(0.13, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffdd99 }));
                tailTip.position.set(0.18, -0.08, -1.35);
                this.group.add(this.tail, tailTip);
                
                // الأرجل
                const legMatLeg = new THREE.MeshStandardMaterial({ color: colorMain });
                const legPos = [[-0.38, -0.1, 0.58], [0.38, -0.1, 0.58], [-0.38, -0.1, -0.32], [0.38, -0.1, -0.32]];
                legPos.forEach(pos => {
                    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.32, 0.24), legMatLeg);
                    leg.position.set(pos[0], pos[1], pos[2]);
                    leg.castShadow = true;
                    this.group.add(leg);
                });
                
                this.group.scale.set(0.92, 0.92, 0.92);
                this.group.position.set(startX, -0.2, startZ);
                scene.add(this.group);
            }
            
            // تحريك الأذنين والذيل بشكل ديناميكي
            updateEarsAndTail(time) {
                const earWiggle = Math.sin(time * 8) * 0.08;
                this.leftEar.rotation.z = -0.25 + earWiggle * 0.5;
                this.rightEar.rotation.z = 0.25 - earWiggle * 0.5;
                const tailSway = Math.sin(time * 5) * 0.15;
                this.tail.rotation.z = 0.4 + tailSway;
            }
            
            setPosition(x, z) {
                this.group.position.set(x, -0.2, z);
            }
            
            setRotation(angle) {
                this.group.rotation.y = angle;
            }
            
            lookAt(targetX, targetZ) {
                const dx = targetX - this.group.position.x;
                const dz = targetZ - this.group.position.z;
                const angle = Math.atan2(dx, dz);
                this.setRotation(angle);
            }
            
            jump() {
                gsap.to(this.group.position, { duration: 0.22, y: 0.15, ease: "power1", yoyo: true, repeat: 1 });
            }
            
            get posX() { return this.group.position.x; }
            get posZ() { return this.group.position.z; }
        }
        
        // إنشاء الثعلبين
        const foxRed = new AdvancedFox(0xd94f1a, 0xffaa77, 1.5, 1.2, "Red");
        const foxGolden = new AdvancedFox(0xc08050, 0xffcc99, -1.2, -1.0, "Golden");
        
        // --- سلوك لعب تفاعلي (مطاردة ودوران وقفزات مشتركة) ---
        let playState = {
            mode: "play", // play, chase, spin
            timer: 0,
            phase: 0,
            targetX: 0, targetZ: 0
        };
        
        // وظيفة تغير السلوك كل بضع ثوانٍ
        function updatePlayBehavior(deltaTime) {
            playState.timer += deltaTime;
            if (playState.timer > 5.0) {
                playState.timer = 0;
                const r = Math.random();
                if (r < 0.4) playState.mode = "chase";
                else if (r < 0.7) playState.mode = "spin";
                else playState.mode = "play";
            }
            
            const speed = 3.2; // سرعة الجري
            const dist = Math.hypot(foxRed.posX - foxGolden.posX, foxRed.posZ - foxGolden.posZ);
            
            // السلوك العام: الثعالب تتفاعل مع بعضها دائماً
            if (playState.mode === "chase") {
                // واحد يطارد الآخر
                if (Math.random() < 0.02) playState.chaser = !playState.chaser; // تبديل المطارد
                const chaser = foxRed;
                const runner = foxGolden;
                // المطارد يذهب نحو الهارب
                const dx = runner.posX - chaser.posX;
                const dz = runner.posZ - chaser.posZ;
                const len = Math.hypot(dx, dz);
                if (len > 0.3) {
                    const move = Math.min(speed * deltaTime, len);
                    const newX = chaser.posX + (dx / len) * move;
                    const newZ = chaser.posZ + (dz / len) * move;
                    chaser.setPosition(newX, newZ);
                    chaser.lookAt(runner.posX, runner.posZ);
                    // الهارب يهرب عشوائياً
                    if (Math.random() < 0.05) {
                        const angle = Math.random() * Math.PI * 2;
                        const escapeX = runner.posX + Math.cos(angle) * 1.2;
                        const escapeZ = runner.posZ + Math.sin(angle) * 1.2;
                        runner.setPosition(escapeX, escapeZ);
                        runner.lookAt(chaser.posX, chaser.posZ);
                    }
                }
                // قفزات أثناء المطاردة
                if (Math.random() < 0.03) foxRed.jump();
                if (Math.random() < 0.03) foxGolden.jump();
            } 
            else if (playState.mode === "spin") {
                // يدوران حول بعضهما
                const centerX = (foxRed.posX + foxGolden.posX) / 2;
                const centerZ = (foxRed.posZ + foxGolden.posZ) / 2;
                const angle = Date.now() * 0.002;
                const radius = 1.5;
                const newX1 = centerX + Math.cos(angle) * radius;
                const newZ1 = centerZ + Math.sin(angle) * radius;
                const newX2 = centerX + Math.cos(angle + Math.PI) * radius;
                const newZ2 = centerZ + Math.sin(angle + Math.PI) * radius;
                foxRed.setPosition(newX1, newZ1);
                foxGolden.setPosition(newX2, newZ2);
                foxRed.lookAt(foxGolden.posX, foxGolden.posZ);
                foxGolden.lookAt(foxRed.posX, foxRed.posZ);
                // قفزات متزامنة خفيفة
                if (Math.random() < 0.02) { foxRed.jump(); foxGolden.jump(); }
            }
            else { // play mode: يلعبان بحرية ويقتربان ويبتعدان
                // يتحركان بشكل عشوائي ولكن مع ميل للبقاء قريبين
                if (dist > 2.5) {
                    // إذا ابتعدا، يقتربان
                    const dirX = foxGolden.posX - foxRed.posX;
                    const dirZ = foxGolden.posZ - foxRed.posZ;
                    const len = Math.hypot(dirX, dirZ);
                    const move = Math.min(speed * deltaTime, len - 1.0);
                    if (len > 0.01) {
                        foxRed.setPosition(foxRed.posX + (dirX/len)*move, foxRed.posZ + (dirZ/len)*move);
                        foxGolden.setPosition(foxGolden.posX - (dirX/len)*move, foxGolden.posZ - (dirZ/len)*move);
                    }
                } else {
                    // حركة عشوائية للطرفين
                    const randomWalk = () => {
                        const angle1 = Math.random() * Math.PI * 2;
                        const angle2 = Math.random() * Math.PI * 2;
                        const step = 1.2 * deltaTime;
                        let newX1 = foxRed.posX + Math.cos(angle1) * step;
                        let newZ1 = foxRed.posZ + Math.sin(angle1) * step;
                        let newX2 = foxGolden.posX + Math.cos(angle2) * step;
                        let newZ2 = foxGolden.posZ + Math.sin(angle2) * step;
                        // تقييد ضمن المنطقة
                        newX1 = Math.min(4.5, Math.max(-4.5, newX1));
                        newZ1 = Math.min(4, Math.max(-4, newZ1));
                        newX2 = Math.min(4.5, Math.max(-4.5, newX2));
                        newZ2 = Math.min(4, Math.max(-4, newZ2));
                        foxRed.setPosition(newX1, newZ1);
                        foxGolden.setPosition(newX2, newZ2);
                    };
                    randomWalk();
                    // نادراً ما يقفزان معاً
                    if (Math.random() < 0.02) { foxRed.jump(); foxGolden.jump(); }
                    else if (Math.random() < 0.04) foxRed.jump();
                    else if (Math.random() < 0.04) foxGolden.jump();
                }
                // يتجهان نحو بعضهما أحياناً
                if (Math.random() < 0.1) {
                    foxRed.lookAt(foxGolden.posX, foxGolden.posZ);
                    foxGolden.lookAt(foxRed.posX, foxRed.posZ);
                } else {
                    // اتجاه عشوائي للتجوال
                    if (Math.random() < 0.05) foxRed.setRotation(Math.random() * Math.PI * 2);
                    if (Math.random() < 0.05) foxGolden.setRotation(Math.random() * Math.PI * 2);
                }
            }
            
            // منع الخروج من المنطقة المرئية
            const clamp = (val, min, max) => Math.min(max, Math.max(min, val));
            foxRed.setPosition(clamp(foxRed.posX, -5.5, 5.5), clamp(foxRed.posZ, -4.5, 5));
            foxGolden.setPosition(clamp(foxGolden.posX, -5.5, 5.5), clamp(foxGolden.posZ, -4.5, 5));
        }
        
        // نجوم للزينة
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1400;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 250;
            starPositions[i*3+1] = (Math.random() - 0.5) * 90;
            starPositions[i*3+2] = (Math.random() - 0.5) * 90 - 50;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xfff5aa, size: 0.09, transparent: true, opacity: 0.7 }));
        scene.add(stars);
        
        // حلقات زهور صغيرة على الأرض
        const flowerMat = new THREE.MeshStandardMaterial({ color: 0xffaa77 });
        for (let i = 0; i < 400; i++) {
            const flower = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.1, 6), flowerMat);
            const ang = Math.random() * Math.PI * 2;
            const rad = 2 + Math.random() * 6;
            const x = Math.cos(ang) * rad;
            const z = Math.sin(ang) * rad;
            flower.position.set(x, -0.22, z);
            flower.castShadow = true;
            scene.add(flower);
        }
        
        // --- حلقة الحركة الرئيسية ---
        let lastTime = performance.now();
        let timeAcc = 0;
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            timeAcc += delta;
            
            updatePlayBehavior(delta);
            
            // تحريك آذان وذيول الثعالب
            foxRed.updateEarsAndTail(timeAcc);
            foxGolden.updateEarsAndTail(timeAcc);
            
            // دوران النجوم البطيء
            stars.rotation.y += 0.0004;
            stars.rotation.x += 0.0002;
            
            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('غابة سعيدة: شجرتان وثعلبان يلعبان معاً بطريقة طبيعية وجميلة');
    </script>
</body>
</html>
