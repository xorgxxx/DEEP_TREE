<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غابة الثعالب الحمراء - بيئة تفاعلية</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      pointer-events: none;
      backdrop-filter: blur(5px);
    }
  </style>
</head>
<body>
  <div id="info">
    <h2>🦊 ثعلبان في الغابة</h2>
    <p>ذكر وأنثى يركضان ويقفزان ويتشقلبان بحرية</p>
    <p style="font-size:0.8em;opacity:0.8">🖱️ اسحب لتدوير الكاميرا | 🔍 عجلة التمرير للتكبير</p>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ============ إعداد المشهد الأساسي ============
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // سماء زرقاء
    scene.fog = new THREE.Fog(0x87CEEB, 30, 120);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 300);
    camera.position.set(20, 18, 30);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // تحكم بالكاميرا
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0);
    controls.maxPolarAngle = Math.PI / 2.2; // منع الذهاب تحت الأرض
    controls.minDistance = 8;
    controls.maxDistance = 60;
    controls.update();

    // ============ إضاءة ============
    // ضوء الشمس
    const sunLight = new THREE.DirectionalLight(0xfff5e6, 2.5);
    sunLight.position.set(30, 40, 20);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.near = 1;
    sunLight.shadow.camera.far = 100;
    sunLight.shadow.camera.left = -50;
    sunLight.shadow.camera.right = 50;
    sunLight.shadow.camera.top = 50;
    sunLight.shadow.camera.bottom = -50;
    sunLight.shadow.bias = -0.0001;
    scene.add(sunLight);

    const ambientLight = new THREE.AmbientLight(0x404066, 1.2);
    scene.add(ambientLight);
    
    // ضوء تعبئة دافئ
    const fillLight = new THREE.PointLight(0xffccaa, 0.8, 40);
    fillLight.position.set(-10, 5, 15);
    scene.add(fillLight);

    // ============ إنشاء أرضية الغابة ============
    // نسيج عشبي باستخدام Canvas
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#4a7c3f';
    ctx.fillRect(0, 0, 512, 512);
    // نقاط عشوائية بلون مختلف قليلاً
    for (let i = 0; i < 3000; i++) {
      ctx.fillStyle = `rgb(${60 + Math.random()*30}, ${100 + Math.random()*40}, ${40 + Math.random()*30})`;
      const x = Math.random() * 512;
      const y = Math.random() * 512;
      ctx.fillRect(x, y, 2, 2);
    }
    const groundTexture = new THREE.CanvasTexture(canvas);
    groundTexture.wrapS = THREE.RepeatWrapping;
    groundTexture.wrapT = THREE.RepeatWrapping;
    groundTexture.repeat.set(15, 15);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 100),
      new THREE.MeshStandardMaterial({ map: groundTexture, roughness: 0.9, metalness: 0.0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.1;
    ground.receiveShadow = true;
    scene.add(ground);

    // ============ إنشاء الأشجار ============
    function createTree(x, z, scale = 1.0) {
      const treeGroup = new THREE.Group();
      
      const trunkHeight = 3.5 * scale;
      const trunkRadius = 0.3 * scale;
      const trunkGeo = new THREE.CylinderGeometry(trunkRadius * 0.9, trunkRadius, trunkHeight, 8);
      const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.8 });
      const trunk = new THREE.Mesh(trunkGeo, trunkMat);
      trunk.position.y = trunkHeight / 2;
      trunk.castShadow = true;
      trunk.receiveShadow = true;
      treeGroup.add(trunk);

      // أوراق الشجر (عدة طبقات مخروطية)
      const leafColors = [0x2d5a27, 0x3d6b37, 0x1e4a1b];
      for (let i = 0; i < 3; i++) {
        const coneGeo = new THREE.ConeGeometry(1.2 * scale - i * 0.25, 1.6 * scale, 8);
        const coneMat = new THREE.MeshStandardMaterial({ color: leafColors[i], roughness: 0.7 });
        const cone = new THREE.Mesh(coneGeo, coneMat);
        cone.position.y = trunkHeight + i * 1.0 * scale;
        cone.castShadow = true;
        cone.receiveShadow = true;
        treeGroup.add(cone);
      }
      
      treeGroup.position.set(x, 0, z);
      return treeGroup;
    }

    // زرع الأشجار في نصف قطر 40 وحدة
    const treePositions = [];
    for (let i = 0; i < 80; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 5 + Math.random() * 38;
      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;
      // تجنب التمركز حول نقطة البداية
      if (Math.abs(x) < 2 && Math.abs(z) < 2) continue;
      
      const scale = 0.8 + Math.random() * 1.3;
      const tree = createTree(x, z, scale);
      scene.add(tree);
      treePositions.push({ x, z, radius: 0.8 * scale });
    }
    
    // بعض الصخور الصغيرة
    const rockGeo = new THREE.IcosahedronGeometry(0.3, 0);
    const rockMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.6 });
    for (let i = 0; i < 40; i++) {
      const rock = new THREE.Mesh(rockGeo, rockMat);
      const angle = Math.random() * Math.PI * 2;
      const dist = 5 + Math.random() * 35;
      rock.position.set(Math.cos(angle) * dist, 0.02, Math.sin(angle) * dist);
      rock.scale.setScalar(0.5 + Math.random() * 1.5);
      rock.castShadow = true;
      rock.receiveShadow = true;
      scene.add(rock);
    }

    // ============ تصميم الثعلب ============
    function createFox(gender = 'male') {
      const fox = new THREE.Group();
      
      // ألوان حسب الجنس (الذكر أغمق قليلاً)
      const bodyColor = gender === 'male' ? 0xcc5500 : 0xdd7733;
      const bellyColor = 0xffddbb;
      const earInnerColor = 0xffaaaa;
      const noseColor = 0x111111;
      const tailTipColor = 0xffffff;
      
      // الجسم
      const bodyGeo = new THREE.CapsuleGeometry(0.45, 0.9, 4, 8);
      const bodyMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.4 });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 0.55;
      body.scale.set(0.9, 0.75, 0.9);
      body.castShadow = true;
      body.receiveShadow = true;
      fox.add(body);
      
      // بطن أبيض
      const bellyGeo = new THREE.CapsuleGeometry(0.35, 0.8, 4, 8);
      const bellyMat = new THREE.MeshStandardMaterial({ color: bellyColor, roughness: 0.5 });
      const belly = new THREE.Mesh(bellyGeo, bellyMat);
      belly.position.set(0, 0.5, -0.03);
      belly.scale.set(0.7, 0.6, 0.5);
      belly.castShadow = true;
      belly.receiveShadow = true;
      fox.add(belly);
      
      // الرأس
      const headGroup = new THREE.Group();
      headGroup.position.set(0, 0.95, 0.75);
      
      const headGeo = new THREE.SphereGeometry(0.38, 16, 16);
      const headMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.3 });
      const head = new THREE.Mesh(headGeo, headMat);
      head.scale.set(0.95, 0.85, 0.85);
      head.castShadow = true;
      head.receiveShadow = true;
      headGroup.add(head);
      
      // خطم
      const snoutGeo = new THREE.ConeGeometry(0.18, 0.4, 8);
      const snoutMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.3 });
      const snout = new THREE.Mesh(snoutGeo, snoutMat);
      snout.position.set(0, -0.1, 0.28);
      snout.rotation.x = -0.2;
      snout.castShadow = true;
      headGroup.add(snout);
      
      // أنف أسود
      const noseGeo = new THREE.SphereGeometry(0.08, 8, 8);
      const noseMat = new THREE.MeshStandardMaterial({ color: noseColor, roughness: 0.2 });
      const nose = new THREE.Mesh(noseGeo, noseMat);
      nose.position.set(0, -0.1, 0.48);
      headGroup.add(nose);
      
      // أذنان
      const earGeo = new THREE.ConeGeometry(0.12, 0.35, 6);
      const earMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.3 });
      
      const earL = new THREE.Mesh(earGeo, earMat);
      earL.position.set(-0.18, 0.32, 0);
      earL.rotation.z = 0.3;
      earL.rotation.x = -0.2;
      earL.castShadow = true;
      headGroup.add(earL);
      
      const earR = new THREE.Mesh(earGeo, earMat);
      earR.position.set(0.18, 0.32, 0);
      earR.rotation.z = -0.3;
      earR.rotation.x = -0.2;
      earR.castShadow = true;
      headGroup.add(earR);
      
      // أذن داخلية وردية
      const innerEarGeo = new THREE.ConeGeometry(0.07, 0.2, 6);
      const innerEarMat = new THREE.MeshStandardMaterial({ color: earInnerColor, roughness: 0.5 });
      const innerEarL = new THREE.Mesh(innerEarGeo, innerEarMat);
      innerEarL.position.set(-0.18, 0.32, 0.02);
      innerEarL.rotation.copy(earL.rotation);
      headGroup.add(innerEarL);
      
      const innerEarR = new THREE.Mesh(innerEarGeo, innerEarMat);
      innerEarR.position.set(0.18, 0.32, 0.02);
      innerEarR.rotation.copy(earR.rotation);
      headGroup.add(innerEarR);
      
      fox.add(headGroup);
      fox.headGroup = headGroup;
      
      // ذيل كثيف متعدد القطع (للتمايل الطبيعي)
      const tailSegments = [];
      const tailGroup = new THREE.Group();
      tailGroup.position.set(0, 0.65, -0.85);
      fox.add(tailGroup);
      fox.tailGroup = tailGroup;
      fox.tailSegments = tailSegments;
      
      const segmentCount = 8;
      let prevSegment = tailGroup;
      for (let i = 0; i < segmentCount; i++) {
        const segmentGroup = new THREE.Group();
        const size = 0.28 - i * 0.025;
        // استخدام كرة مطولة قليلاً
        const segGeo = new THREE.SphereGeometry(size, 8, 8);
        const segColor = i === segmentCount - 1 ? tailTipColor : bodyColor;
        const segMat = new THREE.MeshStandardMaterial({ color: segColor, roughness: 0.3 });
        const segment = new THREE.Mesh(segGeo, segMat);
        segment.scale.set(0.7, 0.7, 1.0);
        segment.position.y = size * 0.6;
        segment.castShadow = true;
        segment.receiveShadow = true;
        segmentGroup.add(segment);
        
        if (i === 0) {
          prevSegment.add(segmentGroup);
        } else {
          prevSegment.add(segmentGroup);
          segmentGroup.position.set(0, 0.18, 0);
        }
        
        tailSegments.push({ group: segmentGroup, phase: i * 0.6 });
        prevSegment = segmentGroup;
      }
      
      // الأرجل (أجزاء علوية وسفلية للحركة الواقعية)
      const legs = [];
      const createLeg = (x, z, isFront) => {
        const legGroup = new THREE.Group();
        legGroup.position.set(x, 0.35, z);
        
        // الفخذ
        const upperGeo = new THREE.CylinderGeometry(0.12, 0.14, 0.5, 6);
        const upperMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.4 });
        const upper = new THREE.Mesh(upperGeo, upperMat);
        upper.position.y = -0.15;
        upper.castShadow = true;
        upper.receiveShadow = true;
        legGroup.add(upper);
        
        // مفصل الركبة / الكاحل
        const lowerPivot = new THREE.Group();
        lowerPivot.position.y = -0.4;
        legGroup.add(lowerPivot);
        
        // الساق
        const lowerGeo = new THREE.CylinderGeometry(0.09, 0.07, 0.45, 6);
        const lowerMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6 });
        const lower = new THREE.Mesh(lowerGeo, lowerMat);
        lower.position.y = -0.2;
        lower.castShadow = true;
        lower.receiveShadow = true;
        lowerPivot.add(lower);
        
        // القدم (مخلب)
        const pawGeo = new THREE.SphereGeometry(0.1, 6, 6);
        const pawMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        const paw = new THREE.Mesh(pawGeo, pawMat);
        paw.position.y = -0.42;
        paw.scale.set(0.8, 0.3, 1.2);
        paw.castShadow = true;
        paw.receiveShadow = true;
        lowerPivot.add(paw);
        
        fox.add(legGroup);
        return { group: legGroup, lowerPivot, isFront, side: x > 0 ? 'right' : 'left' };
      };
      
      fox.legs = [
        createLeg(-0.25, 0.55, true),  // أمامي يسار
        createLeg(0.25, 0.55, true),   // أمامي يمين
        createLeg(-0.25, -0.55, false), // خلفي يسار
        createLeg(0.25, -0.55, false)  // خلفي يمين
      ];
      
      fox.body = body;
      fox.userData = {
        walkPhase: Math.random() * Math.PI * 2,
        tailTime: 0
      };
      
      return fox;
    }

    // إنشاء الثعلبين
    const maleFox = createFox('male');
    maleFox.position.set(-5, 0, 0);
    maleFox.castShadow = true;
    maleFox.receiveShadow = true;
    scene.add(maleFox);
    
    const femaleFox = createFox('female');
    femaleFox.position.set(4, 0, 2);
    femaleFox.castShadow = true;
    femaleFox.receiveShadow = true;
    scene.add(femaleFox);

    // ============ محاكاة سلوك الثعالب ============
    const forestRadius = 38;
    
    const foxStates = {
      male: {
        type: 'wander',
        target: new THREE.Vector2(-5, 0),
        timer: 0,
        chaseTimer: 0,
        jumpState: null // { time, rotationSpeed }
      },
      female: {
        type: 'wander',
        target: new THREE.Vector2(4, 2),
        timer: 0,
        jumpState: null
      }
    };
    
    function getRandomForestPoint() {
      const angle = Math.random() * Math.PI * 2;
      const radius = 5 + Math.random() * (forestRadius - 5);
      return new THREE.Vector2(
        Math.cos(angle) * radius,
        Math.sin(angle) * radius
      );
    }
    
    function distance2D(a, b) {
      return Math.sqrt((a.x - b.x) ** 2 + (a.z - b.z) ** 2);
    }
    
    function updateFoxAI(fox, otherFox, state, deltaTime) {
      const foxPos = new THREE.Vector2(fox.position.x, fox.position.z);
      const otherPos = new THREE.Vector2(otherFox.position.x, otherFox.position.z);
      const dist = distance2D(foxPos, otherPos);
      
      // تحديث حالة القفز
      if (state.jumpState) {
        state.jumpState.time -= deltaTime;
        if (state.jumpState.time <= 0) {
          // إنهاء القفز/الشقلبة
          fox.position.y = 0;
          fox.rotation.x = 0;
          state.jumpState = null;
          state.type = 'wander';
          state.target = getRandomForestPoint();
        }
        return; // أثناء القفز لا نفعل شيئاً آخر
      }
      
      // منطق السلوك
      state.timer -= deltaTime;
      
      // احتمالية بدء المطاردة عندما يكونان قريبين
      if (dist < 12 && state.type === 'wander' && state.timer <= 0 && Math.random() < 0.01) {
        state.type = 'chase';
        state.timer = 4 + Math.random() * 3;
        // الذكر يطارد الأنثى غالباً
        if (Math.random() < 0.7) {
          maleFoxState.type = 'chase';
          maleFoxState.timer = 4 + Math.random() * 3;
        }
      }
      
      // احتمالية اللعب (قفز وشقلبة) عندما يكونان قريبين جداً
      if (dist < 5 && Math.random() < 0.008 && !foxStates.male.jumpState && !foxStates.female.jumpState) {
        // بدء اللعب المتزامن
        const playType = Math.random() < 0.5 ? 'jump' : 'somersault';
        const jumpDuration = playType === 'jump' ? 1.2 : 1.8;
        
        foxStates.male.jumpState = { time: jumpDuration, type: playType };
        foxStates.female.jumpState = { time: jumpDuration, type: playType };
        foxStates.male.type = 'play';
        foxStates.female.type = 'play';
      }
      
      if (state.type === 'wander') {
        // التحرك نحو الهدف العشوائي
        const dir = new THREE.Vector2(state.target.x - foxPos.x, state.target.y - foxPos.y);
        const len = dir.length();
        if (len < 0.8 || state.timer <= 0) {
          state.target = getRandomForestPoint();
          state.timer = 3 + Math.random() * 5;
        }
        dir.normalize();
        fox.position.x += dir.x * deltaTime * 2.5;
        fox.position.z += dir.y * deltaTime * 2.5;
        // التوجيه
        const angle = Math.atan2(dir.x, dir.y);
        fox.rotation.y = angle;
      }
      else if (state.type === 'chase') {
        // المطاردة: الذكر يطارد الأنثى (أو العكس حسب من بدأ)
        const chaser = fox === maleFox ? maleFoxState : femaleFoxState;
        const evader = fox === maleFox ? femaleFoxState : maleFoxState;
        
        if (chaser.type === 'chase') {
          // المهاجم
          const dir = new THREE.Vector2(otherPos.x - foxPos.x, otherPos.y - foxPos.y);
          const len = dir.length();
          if (len < 1.5) {
            // توقف المطاردة واللعب
            state.type = 'wander';
            state.target = getRandomForestPoint();
            state.timer = 2;
          } else {
            dir.normalize();
            fox.position.x += dir.x * deltaTime * 4.5;
            fox.position.z += dir.y * deltaTime * 4.5;
            const angle = Math.atan2(dir.x, dir.y);
            fox.rotation.y = angle;
          }
        }
        // الهارب يتحرك بعيداً
        if (state.type === 'chase' && fox === femaleFox) {
          // الأنثى تهرب
          const dir = new THREE.Vector2(foxPos.x - otherPos.x, foxPos.y - otherPos.y);
          if (dir.length() > 0.01) {
            dir.normalize();
            // إضافة بعض العشوائية
            dir.x += (Math.random() - 0.5) * 0.3;
            dir.y += (Math.random() - 0.5) * 0.3;
            dir.normalize();
            fox.position.x += dir.x * deltaTime * 4.0;
            fox.position.z += dir.y * deltaTime * 4.0;
            const angle = Math.atan2(dir.x, dir.y);
            fox.rotation.y = angle;
          }
          if (state.timer <= 0 || distance2D(foxPos, otherPos) > 18) {
            state.type = 'wander';
            state.target = getRandomForestPoint();
            state.timer = 2;
          }
        }
      }
      
      // إبقاء الثعلب داخل الغابة
      const pos = new THREE.Vector2(fox.position.x, fox.position.z);
      if (pos.length() > forestRadius) {
        pos.normalize().multiplyScalar(forestRadius - 0.5);
        fox.position.x = pos.x;
        fox.position.z = pos.y;
      }
    }
    
    // ============ تحديث الحركات (الأرجل، الذيل، الرأس) ============
    function animateFoxParts(fox, speed, deltaTime) {
      const walkPhase = fox.userData.walkPhase;
      fox.userData.walkPhase += speed * deltaTime * 12;
      fox.userData.tailTime += deltaTime;
      
      const phase = fox.userData.walkPhase;
      const t = fox.userData.tailTime;
      
      // تحريك الأرجل
      fox.legs.forEach((leg, index) => {
        const isFront = leg.isFront;
        const sideOffset = leg.side === 'right' ? Math.PI : 0;
        const frontOffset = isFront ? 0 : Math.PI * 0.7;
        const legPhase = phase + sideOffset + frontOffset;
        
        // تأرجح الفخذ للأمام والخلف
        const swingAngle = Math.sin(legPhase) * 0.5;
        leg.group.rotation.x = swingAngle;
        
        // ثني الركبة
        const kneeAngle = Math.abs(Math.sin(legPhase)) * 0.6;
        leg.lowerPivot.rotation.x = kneeAngle;
      });
      
      // تحريك الذيل بتمايل طبيعي
      if (fox.tailSegments) {
        fox.tailSegments.forEach((seg, i) => {
          const wave = Math.sin(t * 5 + seg.phase) * 0.25;
          const wave2 = Math.cos(t * 3.5 + seg.phase) * 0.15;
          seg.group.rotation.x = wave * 0.8;
          seg.group.rotation.z = wave2;
        });
      }
      
      // هز الرأس قليلاً أثناء الحركة
      if (fox.headGroup) {
        fox.headGroup.rotation.x = Math.sin(phase * 1.5) * 0.05;
        fox.headGroup.rotation.z = Math.cos(phase * 1.2) * 0.03;
      }
      
      // حركة الجسم ارتفاعاً وانخفاضاً طفيفة
      if (fox.body) {
        fox.body.position.y = 0.55 + Math.abs(Math.sin(phase)) * 0.05;
      }
    }
    
    // ============ حلقة الرسم الرئيسية ============
    const clock = new THREE.Clock();
    
    function animate() {
      const deltaTime = Math.min(clock.getDelta(), 0.1);
      
      // تحديث سلوك الثعالب
      updateFoxAI(maleFox, femaleFox, foxStates.male, deltaTime);
      updateFoxAI(femaleFox, maleFox, foxStates.female, deltaTime);
      
      // حساب سرعة الحركة لتحريك الأجزاء
      const maleSpeed = distance2D(
        new THREE.Vector2(maleFox.position.x, maleFox.position.z),
        new THREE.Vector2(maleFox.userData.prevX || 0, maleFox.userData.prevZ || 0)
      ) / deltaTime;
      const femaleSpeed = distance2D(
        new THREE.Vector2(femaleFox.position.x, femaleFox.position.z),
        new THREE.Vector2(femaleFox.userData.prevX || 0, femaleFox.userData.prevZ || 0)
      ) / deltaTime;
      
      maleFox.userData.prevX = maleFox.position.x;
      maleFox.userData.prevZ = maleFox.position.z;
      femaleFox.userData.prevX = femaleFox.position.x;
      femaleFox.userData.prevZ = femaleFox.position.z;
      
      // تحريك أجزاء الثعالب
      const maleAnimSpeed = Math.min(maleSpeed / 4.0, 1.0);
      const femaleAnimSpeed = Math.min(femaleSpeed / 4.0, 1.0);
      
      animateFoxParts(maleFox, maleAnimSpeed, deltaTime);
      animateFoxParts(femaleFox, femaleAnimSpeed, deltaTime);
      
      // تحديث القفزات والشقلبات
      [maleFox, femaleFox].forEach((fox, idx) => {
        const state = idx === 0 ? foxStates.male : foxStates.female;
        if (state.jumpState) {
          const elapsed = 1 - state.jumpState.time / (state.jumpState.type === 'jump' ? 1.2 : 1.8);
          // مسار قفزي باستخدام منحنى جيبي
          const jumpHeight = Math.sin(elapsed * Math.PI) * 2.5;
          fox.position.y = jumpHeight;
          
          if (state.jumpState.type === 'somersault') {
            // شقلبة كاملة
            fox.rotation.x = elapsed * Math.PI * 2;
          } else {
            // مجرد قفزة عادية
            fox.rotation.x = 0;
          }
        }
      });
      
      controls.update();
      
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();

    // التعامل مع تغيير حجم النافذة
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log('🦊 الغابة التفاعلية جاهزة! الثعالب تركض وتقفز وتتشقلب بحرية.');
  </script>
</body>
</html>
