<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>غابة الثعالب المرحة</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        /* لا توجد أي عناصر إضافية - فقط المشهد التفاعلي */
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "gsap": "https://unpkg.com/gsap@3.12.5/index.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import gsap from 'gsap';

        // --- إعداد المشهد ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a2f1f); // لون غابة جميل
        scene.fog = new THREE.FogExp2(0x0a2f1f, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(7, 5, 9);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // التحكم بالكاميرا (تفاعل بالماوس فقط)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.2;
        controls.target.set(0, 2.5, 0);

        // --- إضاءة طبيعية ---
        const ambientLight = new THREE.AmbientLight(0x3c5e4c);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5c0, 1.2);
        dirLight.position.set(5, 10, 4);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 20;
        dirLight.shadow.camera.left = -7;
        dirLight.shadow.camera.right = 7;
        dirLight.shadow.camera.top = 7;
        dirLight.shadow.camera.bottom = -7;
        scene.add(dirLight);
        
        const backLight = new THREE.PointLight(0xc9a87c, 0.5);
        backLight.position.set(-3, 3, -4);
        scene.add(backLight);
        
        const fillLight = new THREE.PointLight(0x88aaff, 0.3);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);

        // أرضية عشبية واسعة
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(22, 22),
            new THREE.MeshStandardMaterial({ color: 0x4c9e3a, roughness: 0.9, metalness: 0.05 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.3;
        ground.receiveShadow = true;
        scene.add(ground);

        // حشائش صغيرة متناثرة
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x6bb55a });
        for (let i = 0; i < 800; i++) {
            const blade = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.07, 0.1 + Math.random()*0.2, 3), grassMat);
            const angle = Math.random() * Math.PI * 2;
            const rad = 2 + Math.random() * 8;
            const x = Math.cos(angle) * rad;
            const z = Math.sin(angle) * rad;
            blade.position.set(x, -0.27, z);
            blade.castShadow = true;
            scene.add(blade);
        }

        // --- دالة لإنشاء شجرة كاملة (جذع + فروع + أوراق) ---
        function createTree(x, z, scaleFactor = 1) {
            const group = new THREE.Group();
            
            // الجذع
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.6 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.7 * scaleFactor, 0.95 * scaleFactor, 2.1 * scaleFactor, 8), trunkMat);
            trunk.position.y = 0.9 * scaleFactor;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            group.add(trunk);
            
            // فروع
            const branchMat = new THREE.MeshStandardMaterial({ color: 0xa57542 });
            const branches = [
                { pos: [0.7, 1.5, 0.4], rot: [0.1, 0.5, 0.5], scale: [0.4, 1.0, 0.4] },
                { pos: [-0.65, 1.6, -0.5], rot: [0, -0.4, 0.4], scale: [0.43, 0.95, 0.43] },
                { pos: [0.4, 2.0, 0.85], rot: [0.2, 0.7, 0.3], scale: [0.38, 0.85, 0.38] },
                { pos: [-0.5, 2.1, -0.75], rot: [-0.1, -0.7, 0.4], scale: [0.4, 0.9, 0.4] },
                { pos: [0.75, 2.4, -0.3], rot: [0.1, 0.9, 0.2], scale: [0.35, 0.8, 0.35] }
            ];
            branches.forEach(b => {
                const branch = new THREE.Mesh(new THREE.CylinderGeometry(b.scale[0] * scaleFactor, b.scale[2] * scaleFactor, b.scale[1] * scaleFactor, 5), branchMat);
                branch.position.set(b.pos[0] * scaleFactor, b.pos[1] * scaleFactor, b.pos[2] * scaleFactor);
                branch.rotation.set(b.rot[0], b.rot[1], b.rot[2]);
                branch.castShadow = true;
                group.add(branch);
            });
            
            // الأوراق
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x5cad3a, roughness: 0.4, emissive: 0x226622, emissiveIntensity: 0.08 });
            const leafPositions = [
                [0, 2.3, 0], [0.6, 2.5, 0.4], [-0.55, 2.6, -0.45], [0.35, 2.8, 0.65], [-0.35, 2.9, -0.3],
                [0.8, 2.2, -0.25], [-0.75, 2.3, 0.2], [0.2, 3.2, 0.3], [-0.2, 3.3, 0.35], [0.55, 2.9, -0.55],
                [0, 3.5, 0], [0.45, 2.0, 0.95], [-0.45, 2.1, -0.95]
            ];
            leafPositions.forEach(pos => {
                const size = (0.45 + Math.random() * 0.2) * scaleFactor;
                const leaf = new THREE.Mesh(new THREE.SphereGeometry(size, 12, 12), leafMat);
                leaf.position.set(pos[0] * scaleFactor, pos[1] * scaleFactor, pos[2] * scaleFactor);
                leaf.castShadow = true;
                group.add(leaf);
            });
            
            // أوراق صغيرة إضافية
            for (let i = 0; i < 35; i++) {
                const angle = Math.random() * Math.PI * 2;
                const rad = 0.8 + Math.random() * 1.5;
                const yoff = 1.8 + Math.random() * 2.0;
                const tinyLeaf = new THREE.Mesh(new THREE.SphereGeometry(0.18 * scaleFactor, 6, 6), leafMat);
                tinyLeaf.position.set(Math.cos(angle) * rad * scaleFactor, yoff * scaleFactor, Math.sin(angle) * rad * scaleFactor);
                tinyLeaf.castShadow = true;
                group.add(tinyLeaf);
            }
            
            group.position.set(x, 0, z);
            return group;
        }
        
        // إضافة شجرتين
        const tree1 = createTree(-2.5, -1.8, 1.0);
        const tree2 = createTree(2.8, 1.5, 1.1);
        scene.add(tree1);
        scene.add(tree2);
        
        // --- إنشاء ثعلب متطور وجميل ---
        function createFox(colorMain, colorAccent) {
            const group = new THREE.Group();
            
            // الجسم
            const bodyGeo = new THREE.SphereGeometry(0.5, 24, 24);
            const bodyMat = new THREE.MeshStandardMaterial({ color: colorMain, roughness: 0.3 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.scale.set(1.2, 0.8, 1.6);
            body.position.y = 0.2;
            body.castShadow = true;
            group.add(body);
            
            // الصدر بلون فاتح
            const chestMat = new THREE.MeshStandardMaterial({ color: colorAccent });
            const chest = new THREE.Mesh(new THREE.SphereGeometry(0.4, 20, 20), chestMat);
            chest.scale.set(0.9, 0.7, 0.8);
            chest.position.set(0, 0.2, 0.65);
            chest.castShadow = true;
            group.add(chest);
            
            // الرأس
            const headMat = new THREE.MeshStandardMaterial({ color: colorMain });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), headMat);
            head.position.set(0, 0.55, 0.85);
            head.castShadow = true;
            group.add(head);
            
            // الأنف
            const nose = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            nose.position.set(0, 0.48, 1.12);
            group.add(nose);
            
            // العيون
            const eyeWhite = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const eyePupil = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.09, 24, 24), eyeWhite);
            leftEye.position.set(-0.18, 0.68, 1.02);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.09, 24, 24), eyeWhite);
            rightEye.position.set(0.18, 0.68, 1.02);
            const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), eyePupil);
            leftPupil.position.set(-0.18, 0.66, 1.1);
            const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), eyePupil);
            rightPupil.position.set(0.18, 0.66, 1.1);
            group.add(leftEye, rightEye, leftPupil, rightPupil);
            
            // الأذنان
            const earMat = new THREE.MeshStandardMaterial({ color: colorMain });
            const earInnerMat = new THREE.MeshStandardMaterial({ color: 0xffaa88 });
            const leftEar = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.45, 12), earMat);
            leftEar.position.set(-0.28, 0.92, 0.82);
            leftEar.rotation.z = -0.2;
            const rightEar = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.45, 12), earMat);
            rightEar.position.set(0.28, 0.92, 0.82);
            rightEar.rotation.z = 0.2;
            const leftInner = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.32, 10), earInnerMat);
            leftInner.position.set(-0.28, 0.94, 0.85);
            const rightInner = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.32, 10), earInnerMat);
            rightInner.position.set(0.28, 0.94, 0.85);
            group.add(leftEar, rightEar, leftInner, rightInner);
            
            // الذيل
            const tailMat = new THREE.MeshStandardMaterial({ color: colorMain });
            const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.1, 0.8, 8), tailMat);
            tail.position.set(0, 0.1, -0.95);
            tail.rotation.x = 0.7;
            tail.rotation.z = 0.4;
            tail.castShadow = true;
            const tailTip = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffdd88 }));
            tailTip.position.set(0.15, -0.05, -1.28);
            group.add(tail, tailTip);
            
            // الأرجل
            const legMatLeg = new THREE.MeshStandardMaterial({ color: colorMain });
            const legPositions = [[-0.35, -0.1, 0.55], [0.35, -0.1, 0.55], [-0.35, -0.1, -0.3], [0.35, -0.1, -0.3]];
            legPositions.forEach(pos => {
                const leg = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.3, 0.22), legMatLeg);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                group.add(leg);
            });
            
            group.scale.set(0.9, 0.9, 0.9);
            return group;
        }
        
        const foxOrange = createFox(0xd94f1a, 0xffaa77);
        const foxBeige = createFox(0xc08050, 0xffcc99);
        scene.add(foxOrange);
        scene.add(foxBeige);
        
        // وضع البداية
        foxOrange.position.set(1.2, -0.2, 1.5);
        foxBeige.position.set(-1.0, -0.2, -1.2);
        
        // --- نظام الجري والركض المستمر مع تغيير عشوائي للأهداف ---
        // مجموعة نقاط حول الشجرتين (مسار مفتوح)
        const waypoints = [
            { x: -2.0, z: -1.5 }, { x: -1.5, z: 0.5 }, { x: 0.5, z: 1.8 }, { x: 2.2, z: 1.0 },
            { x: 2.5, z: -0.5 }, { x: 1.5, z: -1.8 }, { x: 0, z: -2.0 }, { x: -2.5, z: 0.8 },
            { x: -1.2, z: 2.0 }, { x: 1.0, z: 2.2 }, { x: 2.8, z: -1.0 }, { x: -2.2, z: -1.0 },
            { x: 0, z: 1.5 }, { x: -0.5, z: -1.5 }
        ];
        
        // لكل ثعلب هدف حالي ومؤقت لتغييره
        let fox1Target = { ...waypoints[0] };
        let fox2Target = { ...waypoints[1] };
        let fox1Speed = 2.2; // سرعة الجري
        let fox2Speed = 2.4;
        
        // تغيير الأهداف بشكل عشوائي كل 2-4 ثوانٍ
        setInterval(() => {
            const newTarget1 = waypoints[Math.floor(Math.random() * waypoints.length)];
            const newTarget2 = waypoints[Math.floor(Math.random() * waypoints.length)];
            fox1Target = { x: newTarget1.x, z: newTarget1.z };
            fox2Target = { x: newTarget2.x, z: newTarget2.z };
        }, 2800);
        
        // قفزات عشوائية أثناء الجري (لمسة مرحة)
        setInterval(() => {
            if (Math.random() > 0.4) {
                gsap.to(foxOrange.position, { duration: 0.2, y: 0.15, ease: "power1", yoyo: true, repeat: 1 });
            }
            if (Math.random() > 0.4) {
                gsap.to(foxBeige.position, { duration: 0.2, y: 0.15, ease: "power1", yoyo: true, repeat: 1 });
            }
        }, 1800);
        
        // وظيفة تحديث حركة الثعالب (ركض مستمر)
        let lastTimestamp = performance.now();
        function updateFoxes(deltaTime) {
            // الثعلب الأول
            const dx1 = fox1Target.x - foxOrange.position.x;
            const dz1 = fox1Target.z - foxOrange.position.z;
            const dist1 = Math.hypot(dx1, dz1);
            if (dist1 > 0.1) {
                const move = Math.min(fox1Speed * deltaTime, dist1);
                foxOrange.position.x += (dx1 / dist1) * move;
                foxOrange.position.z += (dz1 / dist1) * move;
                // توجيه الثعلب نحو اتجاه الحركة
                const angle1 = Math.atan2(dx1, dz1);
                foxOrange.rotation.y = angle1;
            } else {
                // إذا وصل للهدف، انتقل فوراً لهدف عشوائي آخر (لتجنب التوقف)
                const newTarget = waypoints[Math.floor(Math.random() * waypoints.length)];
                fox1Target = { x: newTarget.x, z: newTarget.z };
            }
            
            // الثعلب الثاني
            const dx2 = fox2Target.x - foxBeige.position.x;
            const dz2 = fox2Target.z - foxBeige.position.z;
            const dist2 = Math.hypot(dx2, dz2);
            if (dist2 > 0.1) {
                const move = Math.min(fox2Speed * deltaTime, dist2);
                foxBeige.position.x += (dx2 / dist2) * move;
                foxBeige.position.z += (dz2 / dist2) * move;
                const angle2 = Math.atan2(dx2, dz2);
                foxBeige.rotation.y = angle2;
            } else {
                const newTarget = waypoints[Math.floor(Math.random() * waypoints.length)];
                fox2Target = { x: newTarget.x, z: newTarget.z };
            }
            
            // إبقاء الثعالب على الأرض
            foxOrange.position.y = -0.2;
            foxBeige.position.y = -0.2;
        }
        
        // --- نجوم متحركة للزينة ---
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 80;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffaa, size: 0.08, transparent: true, opacity: 0.6 }));
        scene.add(stars);
        
        // --- حلقة الرسم والحركة ---
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            updateFoxes(delta);
            
            // دوران بطيء للنجوم
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0003;
            
            // تحديث الكاميرا
            controls.update();
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // استجابة لتغيير حجم النافذة
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log('منظر طبيعي مع شجرتين وثعالب تركض بحرية!');
    </script>
</body>
</html>
