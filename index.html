<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦊 ثعالب وأرانب</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }

#hud {
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 24px; pointer-events:none; z-index:10;
}
#title {
  font-family:'Georgia', serif; font-size:20px; font-weight:bold;
  color:#fff; text-shadow:0 0 20px rgba(255,150,50,0.8);
  letter-spacing:2px;
}
#title span { color:#ff7722; }
#controls {
  font-size:11px; color:rgba(255,255,255,0.5);
  text-align:left; letter-spacing:1px; line-height:1.8;
  pointer-events:none; font-family:monospace;
}

#behavior-label {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.5); backdrop-filter:blur(10px);
  border:1px solid rgba(255,120,30,0.3); border-radius:30px;
  padding:8px 22px; color:#ffaa55; font-size:13px;
  letter-spacing:1.5px; transition:opacity 0.5s;
  pointer-events:none; z-index:10; font-family:'Georgia',serif;
}

#time-btn {
  position:fixed; bottom:24px; right:24px;
  background:rgba(255,255,255,0.1); backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.2); border-radius:20px;
  padding:8px 16px; color:#fff; font-size:12px; cursor:pointer;
  z-index:10; transition:background 0.3s; letter-spacing:1px;
}
#time-btn:hover { background:rgba(255,200,100,0.25); border-color:rgba(255,200,100,0.4); }
</style>
</head>
<body>
<div id="hud">
</div>
<div id="behavior-label">🌿 يستكشفان المكان...</div>
<div id="time-btn">☀️ تبديل النهار / الليل</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════════════════
//  RENDERER + SCENE
// ══════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0d0820, 0.018);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 300);
camera.position.set(0, 10, 22);

// ══════════════════════════════════════════════════════
//  DAY/NIGHT
// ══════════════════════════════════════════════════════
let isNight = true;
let transitionT = 1.0;
let transitioning = false, transitionDir = 0;
const skyColNight = new THREE.Color(0x0d0820);
const skyColDay   = new THREE.Color(0x4a90d9);
const fogColNight = new THREE.Color(0x0d0820);
const fogColDay   = new THREE.Color(0x87ceeb);

document.getElementById('time-btn').addEventListener('click', () => {
  isNight = !isNight;
  transitioning = true;
  transitionDir = isNight ? 1 : -1;
});

// ══════════════════════════════════════════════════════
//  LIGHTING
// ══════════════════════════════════════════════════════
const ambientLight = new THREE.AmbientLight(0x221144, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0x334488, 0.8);
sunLight.position.set(15, 25, 10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2030, 2030);
sunLight.shadow.camera.near = 1; sunLight.shadow.camera.far = 200;
sunLight.shadow.camera.left = -25; sunLight.shadow.camera.right = 50;
sunLight.shadow.camera.top = 25; sunLight.shadow.camera.bottom = -50;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);

const moonLight = new THREE.PointLight(0x8899dd, 1.8, 70);
moonLight.position.set(-20, 22, -20);
scene.add(moonLight);

const groundBounce = new THREE.HemisphereLight(0x332211, 0x223311, 0.4);
scene.add(groundBounce);

// ══════════════════════════════════════════════════════
//  SKY SPHERE + MOON + STARS
// ══════════════════════════════════════════════════════
const skyMat = new THREE.MeshBasicMaterial({ color:0x0d0820, side:THREE.BackSide });
scene.add(new THREE.Mesh(new THREE.SphereGeometry(120,32,16), skyMat));

const moonMesh = new THREE.Mesh(
  new THREE.SphereGeometry(2.8, 20, 16),
  new THREE.MeshLambertMaterial({ color:0xeeeedd, emissive:0xaaaacc, emissiveIntensity:0.7 })
);
moonMesh.position.set(-35, 48, -65);
scene.add(moonMesh);

const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i = 0; i < 3500; i++) {
  const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1), r = 100+Math.random()*15;
  starPos.push(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color:0xffffff, size:0.25, transparent:true, opacity:0.9 });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ══════════════════════════════════════════════════════
//  GROUND
// ══════════════════════════════════════════════════════
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(26, 80),
  new THREE.MeshLambertMaterial({ color:0x1e4010 })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

for (let i = 0; i < 55; i++) {
  const r = Math.random()*22+1, a = Math.random()*Math.PI*2;
  const p = new THREE.Mesh(
    new THREE.CircleGeometry(Math.random()*1.6+0.3, 7),
    new THREE.MeshLambertMaterial({ color:new THREE.Color().setHSL(0.27+Math.random()*0.07,0.65+Math.random()*0.2,0.15+Math.random()*0.12) })
  );
  p.rotation.x = -Math.PI/2;
  p.position.set(Math.cos(a)*r, 0.01, Math.sin(a)*r);
  scene.add(p);
}

// Grass blades
const grassBlades = [];
for (let i = 0; i < 350; i++) {
  const r = Math.random()*23+0.5, a = Math.random()*Math.PI*2;
  const h = Math.random()*0.35+0.15;
  const blade = new THREE.Mesh(
    new THREE.PlaneGeometry(0.07, h),
    new THREE.MeshLambertMaterial({ color:new THREE.Color().setHSL(0.3+Math.random()*0.06,0.7,0.25+Math.random()*0.12), side:THREE.DoubleSide })
  );
  blade.position.set(Math.cos(a)*r, h/2, Math.sin(a)*r);
  blade.rotation.y = Math.random()*Math.PI;
  blade._phase = Math.random()*Math.PI*2;
  scene.add(blade);
  grassBlades.push(blade);
}

// Rocks
function makeRock(x,z,s) {
  const m = new THREE.Mesh(
    new THREE.DodecahedronGeometry(s, 1),
    new THREE.MeshLambertMaterial({ color:new THREE.Color().setHSL(0.1,0.1,0.35+Math.random()*0.15) })
  );
  m.position.set(x, s*0.55, z);
  m.rotation.set(Math.random()*3,Math.random()*3,Math.random()*3);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m);
}
[[-8,3,0.5],[-8.6,4.2,0.3],[9.5,-4,0.65],[6.5,7.5,0.38],[-5.5,-8.5,0.52],[3,-9.5,0.29],[-11.5,0.5,0.42],[10.5,5.5,0.26]].forEach(([x,z,s])=>makeRock(x,z,s));

// ══════════════════════════════════════════════════════
//  TREES
// ══════════════════════════════════════════════════════
const allTrees = [];
function makeTree(x, z, trunkH, cs) {
  const g = new THREE.Group();
  const tMat = new THREE.MeshLambertMaterial({ color:0x4a2e0e });
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.14*cs,0.28*cs,trunkH,9), tMat);
  trunk.position.y = trunkH/2; trunk.castShadow = true; g.add(trunk);

  // branch stubs
  for (let i = 0; i < 3; i++) {
    const br = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.07,0.6*cs,5), tMat);
    const ba = (i/3)*Math.PI*2;
    br.position.set(Math.cos(ba)*0.25*cs, trunkH*0.6, Math.sin(ba)*0.25*cs);
    br.rotation.z = 0.8; br.rotation.y = ba; g.add(br);
  }

  const leafColors = [0x1a5c26,0x236b2f,0x2d8a3e,0x1e6b2a];
  const cones = [];
  [[trunkH+0.6,2.6,2.4],[trunkH+1.9,2.0,1.8],[trunkH+2.9,1.4,1.3],[trunkH+3.7,0.8,0.9]].forEach(([y,r,h],i)=>{
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(r*cs, h*cs, 9),
      new THREE.MeshLambertMaterial({ color:leafColors[i] })
    );
    cone.position.y = y; cone.castShadow = true; g.add(cone); cones.push(cone);
  });
  g._cones = cones; g._phase = Math.random()*Math.PI*2;
  g.position.set(x, 0, z); scene.add(g); allTrees.push(g);
  return g;
}
makeTree(0,-4.5,3.5,1.1);
makeTree(-10.5,-2.5,2.8,0.9);
makeTree(9.5,2.5,3.0,0.95);
makeTree(-7.5,7.5,2.2,0.8);
makeTree(8.5,-7.5,2.5,0.85);
makeTree(-13.5,4.5,2.0,0.75);
makeTree(13.5,-3.5,2.4,0.8);

// ══════════════════════════════════════════════════════
//  FLOWERS + MUSHROOMS
// ══════════════════════════════════════════════════════
const flowerColors=[0xff2255,0xffcc00,0xff66bb,0xcc44ff,0xff8800,0x44ddff,0xffffff,0xff4400];
const allFlowers = [];
function makeFlower(x,z) {
  const g = new THREE.Group();
  const h = 0.3+Math.random()*0.3;
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.02,h,4), new THREE.MeshLambertMaterial({color:0x33aa44}));
  stem.position.y = h/2; g.add(stem);
  const col = flowerColors[Math.floor(Math.random()*flowerColors.length)];
  const pMat = new THREE.MeshLambertMaterial({color:col});
  for (let i=0;i<5;i++) {
    const petal = new THREE.Mesh(new THREE.SphereGeometry(0.06,5,4), pMat);
    const a = (i/5)*Math.PI*2;
    petal.position.set(Math.cos(a)*0.075, h+0.01, Math.sin(a)*0.075); g.add(petal);
  }
  const center = new THREE.Mesh(
    new THREE.SphereGeometry(0.052,6,5),
    new THREE.MeshLambertMaterial({color:0xffee00,emissive:0xffcc00,emissiveIntensity:0.3})
  );
  center.position.y = h+0.05; g.add(center);
  g.position.set(x,0,z); g._phase=Math.random()*Math.PI*2; scene.add(g); allFlowers.push(g);
}
for (let i=0;i<65;i++) {
  const a=Math.random()*Math.PI*2, r=Math.random()*19+1;
  makeFlower(Math.cos(a)*r, Math.sin(a)*r);
}

function makeMushroom(x,z) {
  const g = new THREE.Group();
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.09,0.3,7), new THREE.MeshLambertMaterial({color:0xddccbb}));
  stem.position.y=0.15; g.add(stem);
  const capGeo = new THREE.SphereGeometry(0.22,8,6); capGeo.scale(1,0.6,1);
  const cap = new THREE.Mesh(capGeo, new THREE.MeshLambertMaterial({color:Math.random()>0.5?0xcc2222:0xeeaa22}));
  cap.position.y=0.34; g.add(cap);
  const dotMat = new THREE.MeshLambertMaterial({color:0xffffff});
  for (let i=0;i<6;i++) {
    const dot = new THREE.Mesh(new THREE.SphereGeometry(0.025,4,3), dotMat);
    const a=Math.random()*Math.PI*2;
    dot.position.set(Math.cos(a)*0.14,0.36+Math.random()*0.07,Math.sin(a)*0.14); g.add(dot);
  }
  g.position.set(x,0,z); scene.add(g);
}
[[-6.5,2.5],[6.5,-3.5],[-3.5,-6.5],[4.5,8.5],[-9.5,-5.5],[2.5,4.5],[-5,9],[9,-2]].forEach(([x,z])=>makeMushroom(x,z));

// ══════════════════════════════════════════════════════
//  FIREFLIES
// ══════════════════════════════════════════════════════
const fireflies = [];
for (let i=0;i<30;i++) {
  const light = new THREE.PointLight(Math.random()>0.5?0x88ff44:0x44aaff, 0, 5);
  const a=Math.random()*Math.PI*2, r=Math.random()*15+2;
  light.position.set(Math.cos(a)*r, 0.5+Math.random()*2.5, Math.sin(a)*r);
  light._phase=Math.random()*Math.PI*2; light._speed=0.3+Math.random()*0.5;
  light._radius=r; light._angle=a; light._baseY=light.position.y;
  scene.add(light);
  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.05,5,4),
    new THREE.MeshBasicMaterial({color:light.color, transparent:true, opacity:0.9})
  );
  light.add(dot);
  fireflies.push(light);
}

// ══════════════════════════════════════════════════════
//  FOX BUILDER (جسم متصل سلس)
// ══════════════════════════════════════════════════════
function buildFox(isFemale) {
  const root = new THREE.Group();
  const orange = isFemale ? 0xdd5511 : 0xff6922;
  function mat(c,emit,eInt) { return new THREE.MeshLambertMaterial({color:c,emissive:emit||0,emissiveIntensity:eInt||0}); }
  const mBody=mat(orange), mDark=mat(0x1a0800), mCream=mat(0xfff0e0), mNose=mat(0x111111), mEye=mat(0x0a0500), mShine=mat(0xffffff), mPink=mat(0xff9999);

  // ─ جسم رئيسي: كبسولة (أسطوانة + كرتين)
  const bodyGroup = new THREE.Group(); bodyGroup.position.y=0.55; root.add(bodyGroup);
  
  // العمود الفقري (أسطوانة)
  const spineGeo = new THREE.CylinderGeometry(0.35, 0.33, 0.7, 12);
  const spine = new THREE.Mesh(spineGeo, mBody);
  spine.position.set(0.2, 0, 0);
  spine.castShadow = true;
  bodyGroup.add(spine);
  
  // كرة الصدر
  const chestBall = new THREE.Mesh(new THREE.SphereGeometry(0.38, 12, 9), mBody);
  chestBall.position.set(0.55, 0.05, 0);
  chestBall.castShadow = true;
  bodyGroup.add(chestBall);
  
  // كرة الورك
  const hipBall = new THREE.Mesh(new THREE.SphereGeometry(0.34, 12, 9), mBody);
  hipBall.position.set(-0.15, -0.1, 0);
  hipBall.castShadow = true;
  bodyGroup.add(hipBall);
  
  // بطن أبيض (شكل بيضاوي مسطح)
  const bellyGeo = new THREE.SphereGeometry(0.28, 10, 8); 
  bellyGeo.scale(1.1, 0.5, 0.7);
  const belly = new THREE.Mesh(bellyGeo, mCream);
  belly.position.set(0.25, -0.1, 0.18);
  bodyGroup.add(belly);

  // صدر أبيض أمامي
  const chestFur = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 6), mCream);
  chestFur.scale.set(0.8, 0.9, 0.5);
  chestFur.position.set(0.7, 0.1, 0);
  bodyGroup.add(chestFur);

  // ─ رأس متصل
  const headGroup = new THREE.Group(); headGroup.position.set(0.85, 0.95, 0); root.add(headGroup);
  const headBall = new THREE.Mesh(new THREE.SphereGeometry(0.32, 12, 9), mBody);
  headBall.castShadow = true;
  headGroup.add(headBall);
  
  // رقبة (مخروط ناعم يربط الرأس بالجسم)
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.28, 0.35, 8), mBody);
  neck.position.set(-0.15, -0.15, 0);
  headGroup.add(neck);
  
  // خطم
  const snout = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.18, 0.4, 8), mCream);
  snout.position.set(0.35, -0.08, 0);
  snout.rotation.z = -0.1;
  headGroup.add(snout);
  
  // أنف
  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 5), mNose);
  nose.position.set(0.58, -0.05, 0);
  headGroup.add(nose);
  
  // عيون
  [-0.12, 0.12].forEach((z, i) => {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.06, 7, 6), mEye);
    eye.position.set(0.25, 0.1, z);
    headGroup.add(eye);
    const shine = new THREE.Mesh(new THREE.SphereGeometry(0.022, 5, 4), mShine);
    shine.position.set(0.3, 0.12, z + (i===0? 0.04 : -0.04));
    headGroup.add(shine);
  });
  
  // أذنان (متصلة بالرأس)
  [-0.16, 0.16].forEach(z => {
    const ear = new THREE.Mesh(new THREE.ConeGeometry(0.09, 0.28, 6), mBody);
    ear.position.set(0.05, 0.35, z);
    ear.rotation.z = z > 0 ? -0.25 : 0.25;
    ear.rotation.x = -0.1;
    headGroup.add(ear);
    const inner = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.18, 6), mPink);
    inner.position.copy(ear.position);
    inner.rotation.copy(ear.rotation);
    headGroup.add(inner);
  });

  // ─ أرجل (مفصلية)
  const legs = [];
  const legPositions = [
    { x: -0.15, z: -0.16, front: false, side: 'left' },
    { x: -0.15, z: 0.16, front: false, side: 'right' },
    { x: 0.55, z: -0.15, front: true, side: 'left' },
    { x: 0.55, z: 0.15, front: true, side: 'right' }
  ];
  
  legPositions.forEach((pos, idx) => {
    const lg = new THREE.Group();
    lg.position.set(pos.x, 0.35, pos.z);
    // الفخذ
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.08, 0.3, 6), pos.front ? mBody : mDark);
    upper.position.y = -0.15;
    lg.add(upper);
    // مفصل الركبة
    const knee = new THREE.Group();
    knee.position.y = -0.35;
    lg.add(knee);
    // الساق
    const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.06, 0.28, 6), mDark);
    lower.position.y = -0.15;
    knee.add(lower);
    // قدم
    const paw = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 5), mCream);
    paw.scale.set(1.1, 0.35, 1.2);
    paw.position.set(0.03, -0.32, 0);
    knee.add(paw);
    
    lg._phase = (idx / 4) * Math.PI * 2;
    root.add(lg);
    legs.push({ group: lg, knee, upper, front: pos.front });
  });

  // ─ ذيل (أنبوب ناعم)
  const tailGroup = new THREE.Group();
  tailGroup.position.set(-0.55, 0.65, 0);
  tailGroup.rotation.z = 0.55;
  root.add(tailGroup);
  
  const tailCurve = new THREE.CubicBezierCurve3(
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(-0.3, 0.3, 0.1),
    new THREE.Vector3(-0.8, 0.6, 0.2),
    new THREE.Vector3(-1.3, 0.5, 0)
  );
  const tailGeo = new THREE.TubeGeometry(tailCurve, 12, 0.15, 6, false);
  const tailMesh = new THREE.Mesh(tailGeo, mBody);
  tailMesh.castShadow = true;
  tailGroup.add(tailMesh);
  
  // طرف الذيل أبيض
  const tipPoint = tailCurve.getPoint(1);
  const tip = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 5), mCream);
  tip.position.copy(tipPoint);
  tailGroup.add(tip);

  // شريطة أنثى (فيونكة)
  if (isFemale) {
    const bowMat = mat(0xff3399, 0xff1177, 0.2);
    [-0.07, 0.07].forEach(z => {
      const b = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 5), bowMat);
      b.scale.set(1.3, 0.7, 0.4);
      b.position.set(0.85, 1.15, z);
      b.rotation.z = z > 0 ? 0.4 : -0.4;
      root.add(b);
    });
    const centerBow = new THREE.Mesh(new THREE.SphereGeometry(0.045, 5, 4), bowMat);
    centerBow.position.set(0.85, 1.15, 0);
    root.add(centerBow);
  }

  root.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
  root._bodyGroup = bodyGroup;
  root._headGroup = headGroup;
  root._tailGroup = tailGroup;
  root._legs = legs;
  return root;
}

const fox1 = buildFox(false);
fox1.position.set(-2.5, 0, 1.5);
scene.add(fox1);
const fox2 = buildFox(true);
fox2.position.set(2.5, 0, 1.5);
fox2.rotation.y = Math.PI;
scene.add(fox2);

// ══════════════════════════════════════════════════════
//  RABBITS (أرانب)
// ══════════════════════════════════════════════════════
const rabbits = [];
function buildRabbit() {
  const root = new THREE.Group();
  const white = new THREE.MeshLambertMaterial({ color: 0xf8f8f0 });
  const grey = new THREE.MeshLambertMaterial({ color: 0xaaaaaa });
  const pink = new THREE.MeshLambertMaterial({ color: 0xffaaaa });
  const black = new THREE.MeshLambertMaterial({ color: 0x111111 });
  
  // جسم
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.3, 10, 8), white);
  body.scale.set(1.1, 0.9, 0.8);
  body.position.y = 0.35;
  body.castShadow = true;
  root.add(body);
  
  // رأس
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), white);
  head.position.set(0.25, 0.5, 0);
  head.castShadow = true;
  root.add(head);
  
  // أذنان طويلتان
  [-0.08, 0.08].forEach(z => {
    const ear = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.07, 0.4, 6), white);
    ear.position.set(0.22, 0.75, z);
    ear.rotation.z = z > 0 ? 0.2 : -0.2;
    root.add(ear);
    const inner = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.05, 0.3, 6), pink);
    inner.position.copy(ear.position);
    inner.rotation.z = ear.rotation.z;
    root.add(inner);
  });
  
  // عين
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 5), black);
  eye.position.set(0.4, 0.55, 0.06);
  root.add(eye);
  const eye2 = eye.clone();
  eye2.position.set(0.4, 0.55, -0.06);
  root.add(eye2);
  
  // أنف
  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.03, 4, 4), pink);
  nose.position.set(0.46, 0.48, 0);
  root.add(nose);
  
  // ذيل دائري
  const tail = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 5), white);
  tail.position.set(-0.35, 0.4, 0);
  root.add(tail);
  
  // أرجل
  for (let i = 0; i < 4; i++) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.25, 5), white);
    leg.position.set(i < 2 ? 0.15 : -0.15, 0.15, i % 2 === 0 ? 0.15 : -0.15);
    leg.castShadow = true;
    root.add(leg);
  }
  
  root.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
  return root;
}

function spawnRabbit() {
  const rabbit = buildRabbit();
  const angle = Math.random() * Math.PI * 2;
  const radius = 5 + Math.random() * 15;
  rabbit.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
  rabbit._vel = new THREE.Vector3((Math.random() - 0.5) * 1.5, 0, (Math.random() - 0.5) * 1.5);
  rabbit._state = 'wander';
  rabbit._timer = Math.random() * 3;
  rabbit._targetAngle = Math.random() * Math.PI * 2;
  scene.add(rabbit);
  rabbits.push(rabbit);
}

// إضافة 3 أرانب مبدئياً
for (let i = 0; i < 99; i++) spawnRabbit();

// ══════════════════════════════════════════════════════
//  LEAF PARTICLES
// ══════════════════════════════════════════════════════
const leafParticles=[];
const leafColors2=[0x44aa22,0xaa6611,0xdd8833,0xff6622,0xcc4422,0x88bb44];
function spawnLeaf() {
  const leaf=new THREE.Mesh(
    new THREE.PlaneGeometry(0.09,0.07),
    new THREE.MeshBasicMaterial({color:leafColors2[Math.floor(Math.random()*leafColors2.length)],side:THREE.DoubleSide,transparent:true,opacity:0.85})
  );
  const a=Math.random()*Math.PI*2, r=Math.random()*10;
  leaf.position.set(Math.cos(a)*r, 5+Math.random()*5, Math.sin(a)*r);
  leaf._vel=new THREE.Vector3((Math.random()-0.5)*0.5,-0.55-Math.random()*0.4,(Math.random()-0.5)*0.5);
  leaf._rot=new THREE.Vector3(Math.random()*2,Math.random()*2,Math.random()*2);
  scene.add(leaf); leafParticles.push(leaf);
}
for (let i=0;i<35;i++) spawnLeaf();

// ══════════════════════════════════════════════════════
//  ORBIT CONTROLS
// ══════════════════════════════════════════════════════
let isDragging=false, prevMX=0, prevMY=0;
let sph={theta:0.3,phi:0.9,r:22}, tSph={theta:0.3,phi:0.9,r:22};
renderer.domElement.addEventListener('mousedown',e=>{isDragging=true;prevMX=e.clientX;prevMY=e.clientY;});
window.addEventListener('mouseup',()=>isDragging=false);
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  tSph.theta-=(e.clientX-prevMX)*0.005;
  tSph.phi=Math.max(0.12,Math.min(1.45,tSph.phi+(e.clientY-prevMY)*0.005));
  prevMX=e.clientX;prevMY=e.clientY;
});
renderer.domElement.addEventListener('wheel',e=>{tSph.r=Math.max(5,Math.min(45,tSph.r+e.deltaY*0.025));},{passive:true});
let touches2={};
renderer.domElement.addEventListener('touchstart',e=>[...e.changedTouches].forEach(t=>touches2[t.identifier]={x:t.clientX,y:t.clientY}));
renderer.domElement.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const t=e.touches[0], prev=touches2[t.identifier]||{x:t.clientX,y:t.clientY};
    tSph.theta-=(t.clientX-prev.x)*0.005;
    tSph.phi=Math.max(0.12,Math.min(1.45,tSph.phi+(t.clientY-prev.y)*0.005));
    touches2[t.identifier]={x:t.clientX,y:t.clientY};
  } else if(e.touches.length===2){
    const a=e.touches[0],b=e.touches[1];
    const dist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    const pa=touches2[a.identifier]||{x:a.clientX,y:a.clientY};
    const pb=touches2[b.identifier]||{x:b.clientX,y:b.clientY};
    tSph.r=Math.max(5,Math.min(45,tSph.r-(dist-Math.hypot(pa.x-pb.x,pa.y-pb.y))*0.05));
    touches2[a.identifier]={x:a.clientX,y:a.clientY};touches2[b.identifier]={x:b.clientX,y:b.clientY};
  }
},{passive:false});
renderer.domElement.addEventListener('touchend',e=>[...e.changedTouches].forEach(t=>delete touches2[t.identifier]));

// ══════════════════════════════════════════════════════
//  AI للثعالب (مع اصطياد الأرانب)
// ══════════════════════════════════════════════════════
const behaviorLabels={
  chase:'🏃 يطارد الثعلبة!', flee:'😱 الثعلبة تهرب!', circle:'🔄 يدوران معاً',
  playbow:'🙇 يدعوها للعب', leap:'🦘 يقفز نحوها!', sniff:'👃 يشمّ الأرض',
  zoomies:'⚡️ جري جنوني!', sitIdle:'😌 يستريح', nuzzle:'💕 لحظة حنان',
  hunt:'🐇 يصطاد أرنباً!'
};
function makeState(b){return{beh:b,timer:0,dur:2+Math.random()*4,angle:Math.random()*Math.PI*2,target:new THREE.Vector3()};}
let s1=makeState('chase'), s2=makeState('flee');
const v1=new THREE.Vector3(), v2=new THREE.Vector3();
let lastLabel='';

function setBehaviorLabel(beh){
  const label=behaviorLabels[beh]||'...';
  if(label!==lastLabel){
    lastLabel=label;
    const el=document.getElementById('behavior-label');
    el.style.opacity='0';
    setTimeout(()=>{el.textContent=label;el.style.opacity='1';},300);
  }
}

function findNearestRabbit(fox) {
  let nearest = null, minDist = Infinity;
  rabbits.forEach(rabbit => {
    const d = fox.position.distanceTo(rabbit.position);
    if (d < minDist) { minDist = d; nearest = rabbit; }
  });
  return nearest;
}

function updateFox(fox,state,other,vel,idx,dt){
  state.timer+=dt;
  const nearestRabbit = findNearestRabbit(fox);
  const distToRabbit = nearestRabbit ? fox.position.distanceTo(nearestRabbit.position) : Infinity;
  
  // احتمالية اصطياد أرنب إذا كان قريباً
  if (distToRabbit < 6 && Math.random() < 0.02 && state.beh !== 'hunt') {
    state.beh = 'hunt';
    state.timer = 0;
    state.dur = 3 + Math.random() * 3;
    state.targetRabbit = nearestRabbit;
  }
  
  if (state.beh !== 'hunt' && state.timer > state.dur) {
    const dist = fox.position.distanceTo(other.position);
    let pool;
    if(dist<2.8) pool=['playbow','nuzzle','leap','circle','flee','zoomies'];
    else if(dist<7) pool=['chase','circle','zoomies','sniff','leap'];
    else pool=['chase','sniff','zoomies','sitIdle','flee'];
    // إضافة الصيد عشوائياً
    if (nearestRabbit && Math.random() < 0.2) pool.push('hunt');
    state.beh = pool[Math.floor(Math.random()*pool.length)];
    state.timer = 0; state.dur = 1.5+Math.random()*3.5;
    if (state.beh === 'hunt') state.targetRabbit = nearestRabbit;
  }
  
  if(idx===0) setBehaviorLabel(state.beh);
  
  const pos=fox.position, otherPos=other.position, spd=3.2;
  
  switch(state.beh){
    case 'hunt': {
      if (!state.targetRabbit || !rabbits.includes(state.targetRabbit)) {
        state.beh = 'wander'; break;
      }
      const rabbitPos = state.targetRabbit.position;
      const d = new THREE.Vector3().subVectors(rabbitPos, pos);
      const dist = d.length();
      if (dist < 0.9) {
        // أمسك الأرنب!
        scene.remove(state.targetRabbit);
        const index = rabbits.indexOf(state.targetRabbit);
        if (index > -1) rabbits.splice(index, 1);
        spawnRabbit(); // أرنب جديد يظهر
        state.beh = 'zoomies'; // فرحة
        state.timer = 0; state.dur = 1.5;
        break;
      }
      vel.lerp(d.normalize().multiplyScalar(spd * 1.6), 0.09);
      break;
    }
    case 'chase':{
      const d=new THREE.Vector3().subVectors(otherPos,pos);
      const dist=d.length();
      if(dist>2.5) vel.lerp(d.normalize().multiplyScalar(spd),0.06);
      else vel.lerp(d.normalize().multiplyScalar(-2),0.06);
      break;
    }
    case 'flee':{
      const d=new THREE.Vector3().subVectors(pos,otherPos).normalize();
      vel.lerp(d.multiplyScalar(spd*1.15),0.07); break;
    }
    case 'circle':{
      state.angle+=dt*(idx===0?1.5:-1.5);
      const cx=Math.cos(state.angle)*4, cz=Math.sin(state.angle)*4;
      vel.lerp(new THREE.Vector3(cx,0,cz).sub(pos).normalize().multiplyScalar(spd),0.07); break;
    }
    case 'playbow':{
      vel.lerp(new THREE.Vector3(),0.12);
      fox._bodyGroup.rotation.x=Math.sin(state.timer*5)*0.28+0.18;
      fox._headGroup.position.y=0.95-Math.sin(state.timer*5)*0.12; break;
    }
    case 'leap':{
      const d=new THREE.Vector3().subVectors(otherPos,pos).normalize();
      vel.lerp(d.multiplyScalar(spd*1.7),0.09);
      fox.position.y=Math.max(0,Math.abs(Math.sin(state.timer*6))*1.0); break;
    }
    case 'sniff':{
      if(state.timer<0.06){const a=Math.random()*Math.PI*2;state.target.set(Math.cos(a)*7,0,Math.sin(a)*7);}
      vel.lerp(new THREE.Vector3().subVectors(state.target,pos).normalize().multiplyScalar(spd*0.35),0.04);
      fox._headGroup.rotation.x=Math.sin(state.timer*4)*0.32-0.18; break;
    }
    case 'zoomies':{
      state.angle+=dt*(idx===0?4:-4);
      const cx=Math.cos(state.angle)*6.5, cz=Math.sin(state.angle)*6.5;
      vel.lerp(new THREE.Vector3(cx,0,cz).sub(pos).normalize().multiplyScalar(spd*2.2),0.11); break;
    }
    case 'sitIdle':{
      vel.lerp(new THREE.Vector3(),0.15);
      fox._bodyGroup.position.y=0.28;
      fox._legs.forEach((l,i)=>{if(i<2)l.group.rotation.x=0.95;}); break;
    }
    case 'nuzzle':{
      const d=new THREE.Vector3().subVectors(otherPos,pos);
      const dist=d.length();
      if(dist>2.0) vel.lerp(d.normalize().multiplyScalar(spd*0.55),0.05);
      else vel.lerp(new THREE.Vector3(),0.1);
      fox._headGroup.rotation.z=Math.sin(state.timer*3)*0.22; break;
    }
  }
  
  // Reset
  if(state.beh!=='playbow'){fox._bodyGroup.rotation.x+=-fox._bodyGroup.rotation.x*0.1;}
  if(state.beh!=='sitIdle'){fox._bodyGroup.position.y+=(0.55-fox._bodyGroup.position.y)*0.1;fox._legs.forEach(l=>l.group.rotation.x+=-l.group.rotation.x*0.1);}
  if(state.beh!=='sniff'&&state.beh!=='nuzzle'){fox._headGroup.rotation.x+=-fox._headGroup.rotation.x*0.1;fox._headGroup.rotation.z+=-fox._headGroup.rotation.z*0.1;}
  if(state.beh!=='leap') fox.position.y=Math.max(0,fox.position.y-dt*5);
  
  // Boundary
  const flat=new THREE.Vector3(pos.x,0,pos.z);
  if(flat.length()>19) vel.add(flat.clone().negate().normalize().multiplyScalar(0.25));
  pos.addScaledVector(vel,dt);
  
  // Rotate towards velocity
  if(state.beh!=='sitIdle'&&vel.length()>0.15){
    let diff=Math.atan2(vel.x,vel.z)-fox.rotation.y;
    while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
    fox.rotation.y+=diff*0.13;
  }
  
  // Leg animation (upper/knee)
  const speed=vel.length();
  fox._legs.forEach(leg => {
    if(state.beh!=='sitIdle'){
      const phase = leg._phase + t * speed * 4.5;
      leg.group.rotation.x = Math.sin(phase) * Math.min(speed * 0.28, 0.65);
      if (leg.knee) leg.knee.rotation.x = Math.abs(Math.cos(phase)) * 0.7;
    }
  });
  
  // Tail wag
  const wagSpd=(state.beh==='zoomies'||state.beh==='leap')?9:4.5;
  fox._tailGroup.rotation.z = 0.55 + Math.sin(t*wagSpd+idx)*0.5;
  fox._tailGroup.rotation.y = Math.sin(t*(wagSpd*0.65)+idx*1.4)*0.35;
  
  // Head idle look
  if(state.beh==='sitIdle'||state.beh==='sniff')
    fox._headGroup.rotation.y=Math.sin(t*0.75+idx)*0.32;
  
  // Breathing
  const br=1+Math.sin(t*1.9+idx)*0.016;
  fox._bodyGroup.scale.set(br,1/br*0.98+0.01,br);
}

// ══════════════════════════════════════════════════════
//  تحديث الأرانب (تجول و هروب)
// ══════════════════════════════════════════════════════
function updateRabbits(dt) {
  rabbits.forEach(rabbit => {
    rabbit._timer -= dt;
    if (rabbit._timer <= 0) {
      rabbit._targetAngle = Math.random() * Math.PI * 2;
      rabbit._timer = 2 + Math.random() * 3;
    }
    // اتجاه عشوائي مع هروب من أقرب ثعلب
    const pos = rabbit.position;
    const dir = new THREE.Vector3(Math.cos(rabbit._targetAngle), 0, Math.sin(rabbit._targetAngle));
    // الهروب من الثعالب
    [fox1, fox2].forEach(fox => {
      const dist = pos.distanceTo(fox.position);
      if (dist < 5) {
        const away = new THREE.Vector3().subVectors(pos, fox.position).normalize();
        dir.copy(away);
      }
    });
    rabbit._vel.lerp(dir.multiplyScalar(2.5), 0.05);
    pos.addScaledVector(rabbit._vel, dt);
    // حدود
    const flat = new THREE.Vector3(pos.x, 0, pos.z);
    if (flat.length() > 20) {
      flat.normalize().multiplyScalar(19);
      pos.x = flat.x; pos.z = flat.y;
    }
    rabbit.rotation.y = Math.atan2(rabbit._vel.x, rabbit._vel.z);
    // قفز بسيط
    rabbit.position.y = Math.sin(t * 8 + Math.random()) * 0.05;
  });
}

// ══════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════
const clock=new THREE.Clock();
let t=0;

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  t += dt;
  
  // Day/Night transition
  if(transitioning){
    transitionT=Math.max(0,Math.min(1,transitionT+transitionDir*0.009));
    if((transitionDir>0&&transitionT>=1)||(transitionDir<0&&transitionT<=0)) transitioning=false;
    skyMat.color.lerpColors(skyColDay,skyColNight,transitionT);
    scene.fog.color.lerpColors(fogColDay,fogColNight,transitionT);
    sunLight.color.set(new THREE.Color().lerpColors(new THREE.Color(0xffe0a0),new THREE.Color(0x334488),transitionT));
    sunLight.intensity=0.8+transitionT*0.1;
    ambientLight.color.set(new THREE.Color().lerpColors(new THREE.Color(0x668899),new THREE.Color(0x221144),transitionT));
    moonLight.intensity=transitionT*2.0;
    starMat.opacity=transitionT*0.9;
    moonMesh.material.emissiveIntensity=transitionT*0.7;
  }
  
  // Fireflies
  fireflies.forEach(f=>{
    f._angle+=dt*f._speed*0.5;
    f.position.x=Math.cos(f._angle)*f._radius+Math.sin(t*0.3+f._phase)*2;
    f.position.z=Math.sin(f._angle)*f._radius+Math.cos(t*0.4+f._phase)*2;
    f.position.y=f._baseY+Math.sin(t*f._speed*1.5+f._phase)*0.7;
    f.intensity=isNight ? Math.max(0,Math.sin(t*f._speed*2+f._phase))*0.9 : 0;
    if(f.children[0]) f.children[0].material.opacity=f.intensity>0.1?0.85:0;
  });
  
  // Camera
  sph.theta+=(tSph.theta-sph.theta)*0.08;
  sph.phi  +=(tSph.phi  -sph.phi  )*0.08;
  sph.r    +=(tSph.r    -sph.r    )*0.08;
  camera.position.set(sph.r*Math.sin(sph.phi)*Math.sin(sph.theta), sph.r*Math.cos(sph.phi), sph.r*Math.sin(sph.phi)*Math.cos(sph.theta));
  camera.lookAt(0,1.2,0);
  
  // Foxes
  updateFox(fox1,s1,fox2,v1,0,dt);
  updateFox(fox2,s2,fox1,v2,1,dt);
  
  // Rabbits
  updateRabbits(dt);
  
  // Tree sway
  allTrees.forEach(tree=>{
    tree._cones&&tree._cones.forEach((c,i)=>{
      c.rotation.z=Math.sin(t*0.75+tree._phase+i*0.3)*0.055;
      c.rotation.x=Math.cos(t*0.55+tree._phase+i*0.22)*0.045;
    });
  });
  
  // Grass sway
  grassBlades.forEach(b=>{ b.rotation.z=Math.sin(t*1.1+b._phase)*0.22; });
  
  // Flower sway
  allFlowers.forEach(f=>{ f.rotation.z=Math.sin(t*0.9+f._phase)*0.13; });
  
  // Leaves
  leafParticles.forEach((leaf,i)=>{
    leaf.position.addScaledVector(leaf._vel,dt);
    leaf.rotation.x+=leaf._rot.x*dt; leaf.rotation.y+=leaf._rot.y*dt; leaf.rotation.z+=leaf._rot.z*dt;
    leaf._vel.x+=Math.sin(t*0.8+i)*0.004;
    if(leaf.position.y<-0.5){
      const a=Math.random()*Math.PI*2, r=Math.random()*12;
      leaf.position.set(Math.cos(a)*r,5+Math.random()*5,Math.sin(a)*r);
      leaf._vel.set((Math.random()-0.5)*0.5,-0.55-Math.random()*0.4,(Math.random()-0.5)*0.5);
    }
  });
  
  // Stars twinkle
  starMat.opacity=isNight?0.7+Math.sin(t*1.5)*0.2:0;
  moonMesh.material.emissiveIntensity=isNight?0.4+Math.sin(t*0.5)*0.25:0;
  
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
